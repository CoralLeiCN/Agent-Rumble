summary:
  one_line: >-
    A local-first desktop and web agent workspace built around OpenCode, with
    shareable skills and MCP connections, remote workspaces, team governance,
    and a two-tool capability MCP for external agents.
  purpose: >-
    OpenWork lets individuals run and organize agent work against local or
    remote workspaces, configure model providers and extensions, review tool
    permissions, and share reusable capabilities; Den adds organization control
    over identities, teams, providers, workers, marketplaces, policies, and the
    OpenWork Connect MCP surface.
  target_users:
    - "Individuals using a desktop agent for coding, research, files, browser tasks, and connected services"
    - "Teams sharing skills, plugins, MCP connections, providers, templates, and workspaces"
    - "Operators self-hosting OpenWork server and OpenCode sidecars"
    - "Organizations governing agent capabilities and hosted workers through Den"
    - "Users of Codex, Claude Code, Cursor, OpenCode, or other MCP clients who want assigned OpenWork capabilities"
  primary_use_cases:
    - "Run OpenCode-backed chat and tool sessions in a desktop or web workspace"
    - "Use local files, terminal tools, artifacts, browser automation, and connected services"
    - "Configure model providers, skills, plugins, commands, and local or remote MCP servers"
    - "Organize, resume, fork, compact, archive, group, and share agent sessions"
    - "Connect to local, remote, containerized, or hosted workspaces"
    - "Publish and assign capabilities to teams through Den"
    - "Expose assigned capabilities to external agents through OpenWork Connect MCP"

