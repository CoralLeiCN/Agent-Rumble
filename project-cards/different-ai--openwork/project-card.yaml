architecture:
  overview: >-
    The Electron shell loads the shared React application and manages an
    OpenWork orchestrator or direct OpenCode/OpenWork-server sidecars. The UI
    uses the OpenCode SDK for agent sessions and OpenWork server APIs for
    workspace, file, extension, approval and remote access functions. The
    orchestrator can run sidecars on the host or inside Docker/Apple container.
    Den is a separate web/API control plane with database-backed organization
    resources, provider and worker management, desktop synchronization, and MCP
    servers including a minimal two-tool interface for external agents.
  languages:
    - "TypeScript"
    - "JavaScript"
    - "TSX/React"
    - "MDX"
    - "Shell"
    - "Swift (computer-use helper)"
  frameworks_and_sdks:
    - name: "React"
      version_constraint: "19.2.4 workspace catalog"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-opencode-architecture"
    - name: "Vite"
      version_constraint: "^6.0.1"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-opencode-architecture"
    - name: "Electron"
      version_constraint: "^35.0.0"
      dependency_relation: development
      required: true
      claim_ids:
        - "claim-opencode-architecture"
    - name: "OpenCode SDK"
      version_constraint: "^1.17.11; engine pinned v1.17.11"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-opencode-architecture"
        - "claim-workspace-sessions"
    - name: "Hono"
      version_constraint: "^4.7.2 in Den API"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-den-control-plane"
    - name: "Next.js"
      version_constraint: "16.2.1 in Den web"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-den-control-plane"
    - name: "Zod"
      version_constraint: "^4.3.6 in core server packages"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-remote-server"
  model_providers:
    - name: "OpenCode provider system"
      version_constraint: "OpenCode v1.17.11 at the recorded snapshot"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-model-providers"
    - name: "OpenAI and ChatGPT authentication"
      version_constraint: "provider configuration delegated through OpenCode"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-providers"
    - name: "OpenAI-compatible endpoints and Ollama"
      version_constraint: "operator-configured through OpenCode"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-model-providers"
    - name: "Den managed model providers and inference proxy"
      version_constraint: "repository snapshot"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-providers"
        - "claim-den-control-plane"
  runtime_and_orchestration:
    - name: "OpenCode engine"
      version_constraint: "v1.17.11"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-opencode-architecture"
    - name: "OpenWork orchestrator"
      version_constraint: "0.17.32"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-opencode-architecture"
        - "claim-remote-server"
    - name: "Bun runtime or compiled Bun binaries"
      version_constraint: "package-specific build/runtime"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-remote-server"
  tools_and_mcp:
    tools:
      - name: "OpenCode tool runtime"
        version_constraint: "v1.17.11"
        dependency_relation: bundled
        required: true
        claim_ids:
