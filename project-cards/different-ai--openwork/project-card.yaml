project:
  project_id: "project-different-ai-openwork"
  name: "OpenWork"
  primary_type: agent_application
  type_rationale: >-
    OpenWork is primarily a deployable agent product: a desktop and web
    workspace for running OpenCode-backed agent sessions, managing models,
    skills, plugins and MCP connections, sharing or remotely accessing
    workspaces, and administering team capabilities through Den. The repository
    includes reusable server, orchestrator and MCP components, but they support
    the product rather than define a general-purpose agent SDK.
  boundary: >-
    The OpenWork product implemented by the single public different-ai/openwork
    monorepo on branch dev at commit
    404db4c1ae83fe9a3b31c49bda77732c55258283. Included are the React application,
    Electron desktop shell, OpenWork server, OpenWork orchestrator, installer,
    shared packages, Den web and API control plane under ee/, OpenWork Connect
    MCP server, repository documentation, representative tests and evals,
    packaging, and deployment configuration. Excluded are the external OpenCode
    implementation and model providers, hosted openworklabs.com production
    environment and data, connected MCP and SaaS implementations, third-party
    dependencies, issues and pull requests, release binaries, and all runtime
    behavior.
  repositories:
    - source_id: "source-openwork-repository"
      url: "https://github.com/different-ai/openwork"
      owner: "different-ai"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "ee/LICENSE"
        - "SECURITY.md"
        - "package.json"
        - "pnpm-workspace.yaml"
        - "constants.json"
        - "apps/app/"
        - "apps/desktop/"
        - "apps/server/"
        - "apps/orchestrator/"
        - "apps/installer/"
        - "packages/"
        - "ee/apps/"
        - "ee/packages/"
        - "docs/"
        - "evals/"
        - "packaging/"
        - ".github/workflows/"
      excluded_paths:
        - "Binary images, GIFs, fonts, and generated documentation assets not needed for distinct evidence"
        - "External OpenCode, model-provider, MCP-server, SaaS, database-service, and sandbox-provider implementations"
        - "Hosted OpenWork production infrastructure, configuration, secrets, accounts, and data"
        - "Issues, pull requests, release binaries, analytics, and community history"
        - "Runtime execution, dependency installation, live OAuth, and dynamic security testing"
  packages:
    - "@openwork/app 0.17.32 (private web application)"
    - "@openwork/desktop 0.17.32 (private Electron shell)"
    - "openwork-server 0.17.32"
    - "openwork-orchestrator 0.17.32"
    - "@openwork/installer 0.1.0"
    - "openwork-bootstrap 0.1.0"
    - "openwork-ui-mcp 0.1.0"
    - "@openwork/handsfree 0.1.0"
    - "@openwork-ee/den-api (private)"
    - "@openwork-ee/den-web 0.0.0 (private)"
    - "@openwork-ee/den-admin-mcp 0.4.0"
    - "Additional shared UI, types, email, connect-link, install-config, enterprise-MCP, Den database, worker, inference, diagnostics, and landing packages"
  services:
    - "Electron desktop application"
    - "React web application"
    - "OpenCode agent-engine sidecar"
    - "OpenWork server and OpenCode proxy"
    - "OpenWork orchestrator CLI and router daemon"
    - "Den web control plane"
    - "Den API, inference, worker proxy, diagnostics, and hosted-worker services"
    - "OpenWork Connect remote MCP server"
  documentation_sites:
    - "Repository-hosted documentation under packages/docs/ and docs/"
    - "https://openworklabs.com/docs (linked; repository content analyzed instead of the deployed site)"
  license: >-
    Mixed source-available licensing: content outside ee/ is MIT; content under
    ee/ is FSL-1.1-MIT with use restrictions and an MIT future license effective
    two years after each version is made available. This description is not a
    legal opinion.
  status: active

