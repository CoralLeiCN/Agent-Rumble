assessment:
  contexts:
    - context_id: "context-openwork-team-agent-platform"
      use_case: "Evaluate OpenWork as a local-first agent workspace and optional team capability platform for technical organizations."
      comparison_cohort:
        - "Desktop coding and general-work agent applications"
        - "OpenCode frontends and self-hosted agent workspaces"
        - "Team agent-capability marketplaces and control planes"
      requirements:
        - "Local or remote workspace sessions with tools and human permission controls"
        - "Model, skill, plugin, command, and MCP extensibility"
        - "Reproducible self-hosting and explicit trust boundaries"
        - "Optional organization governance and external-agent interoperability"
        - "No assumption that static inspection verifies runtime quality or security"
      organizational_constraints:
        - "Willingness to operate OpenCode and grant appropriate filesystem/tool access"
        - "Ability to manage model, MCP, OAuth, workspace, and server credentials"
        - "Acceptance of the MIT/FSL-1.1-MIT license split where Den functionality is required"
        - "Operational capacity for Den, database, identity, worker, inference, and observability services when self-hosting team features"
      assessed_at: "2026-07-18T13:18:47Z"
  maturity: early
  maturity_signals:
    - statement: "OpenWork has versioned 0.17.32 desktop, app, server, and orchestrator components, broad tests and eval descriptions, packaging, deployment manifests, documentation, and a security policy."
      reasoning: "The repository shows substantial product breadth and engineering structure, but remains pre-1.0 and active-development behavior was not executed."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-classification"
        - "claim-early-maturity"
    - statement: "The source separates UI, runtime, workspace API, and organization control-plane components with explicit routes and package boundaries."
      reasoning: "The modular monorepo and mapped source paths support maintainability, though operational complexity is correspondingly high."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-opencode-architecture"
        - "claim-den-control-plane"
        - "claim-early-maturity"
  strengths:
    - statement: "OpenWork combines a polished workspace application with headless/remote operation and organization capability distribution."
      reasoning: "The same product boundary includes desktop/web UI, server and orchestrator components, Den governance, and OpenWork Connect MCP."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-opencode-architecture"
        - "claim-remote-server"
        - "claim-den-control-plane"
        - "claim-mcp-both"
    - statement: "Skills, plugins, commands, MCP servers, providers, sessions, and workspaces are structured as shareable and governable objects."
      reasoning: "The server and Den expose explicit persistence, assignment, import/export, audit, and sync paths for these resources."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-extension-management"
        - "claim-workspace-sessions"
        - "claim-den-control-plane"
  limitations:
    - statement: "Core agent execution and many provider/tool semantics are delegated to the external OpenCode project."
      reasoning: "OpenWork pins and manages OpenCode, and its UI/server clients use the OpenCode SDK rather than implementing the model-tool loop in this repository."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-opencode-architecture"
        - "claim-model-providers"
    - statement: "Cross-chat memory currently reads bounded saved session history rather than providing semantic retrieval over all prior messages."
      reasoning: "The first-party memory guide makes this limitation explicit."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-workspace-sessions"
    - statement: "External-client support for OpenWork Connect is not uniformly verified."
      reasoning: "Repository documentation distinguishes verified, setup-only, and unsupported OAuth flows across MCP clients."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-mcp-both"
  risks:
    - statement: "Host-side tools, local workspaces, extensions, MCP servers, and auto approval can create broad file, command, credential, and network exposure."
      reasoning: "The product provides tokens, permissions, approvals, authorized folders, and optional containers, but the operator controls the effective boundary and may disable manual review."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-local-execution-risk"
        - "claim-approval-and-sandbox"
    - statement: "Den adds a high-value identity and capability control plane whose compromise or misconfiguration can affect shared providers, connections, workers, and organizations."
      reasoning: "The source and operations guide show sensitive identity, RBAC, secrets, provisioning, and capability-distribution responsibilities."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-control-plane-risk"
        - "claim-den-control-plane"
    - statement: "The mixed MIT and FSL-1.1-MIT licensing can constrain commercial redistribution or competing-use scenarios involving ee/ components."
      reasoning: "The root and ee licenses establish different terms; adopters need their own legal review."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-license-split"
  best_fit:
    - statement: "Technical individuals and teams that want an OpenCode-based desktop agent with configurable providers, skills, MCPs, permissions, and remote workspace options."
      reasoning: "These are the central application and server capabilities present in the analyzed boundary."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-classification"
        - "claim-opencode-architecture"
        - "claim-extension-management"
        - "claim-remote-server"
    - statement: "Organizations willing to operate or subscribe to Den for shared providers, workers, marketplaces, RBAC, policy, and agent-facing capability distribution."
      reasoning: "Den and OpenWork Connect directly implement these team-level flows."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-den-control-plane"
        - "claim-mcp-both"
  poor_fit:
    - statement: "Teams seeking a standalone agent runtime independent of OpenCode."
      reasoning: "OpenCode is a required, pinned engine dependency for core agent sessions."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-opencode-architecture"
    - statement: "Organizations requiring the entire source tree under a permissive license today."
      reasoning: "The ee/ control-plane implementation uses FSL-1.1-MIT rather than the root MIT terms."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-license-split"
    - statement: "Deployments unable to govern local tool execution or operate the identity, storage, secrets, and availability requirements of a team control plane."
      reasoning: "Both the local runtime and Den cross sensitive trust boundaries that require operator controls."
      context_id: "context-openwork-team-agent-platform"
      confidence: high
      claim_ids:
        - "claim-local-execution-risk"
        - "claim-control-plane-risk"
  gaps: []

