      claim_ids:
        - "claim-projects"
        - "claim-file-protocol"
  interfaces:
    - name: "REST API"
      version_constraint: "@openags/app 0.0.6"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-ui-server"
    - name: "Shell, Chat, and Workflow WebSockets"
      version_constraint: "@openags/app 0.0.6"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-ui-server"
        - "claim-workflow"
  deployment:
    - name: "Electron desktop packages"
      version_constraint: "@openags/desktop 0.0.6"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-ui-server"
    - name: "Node.js browser-mode server"
      version_constraint: "@openags/app 0.0.6"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-ui-server"
    - name: "Docker Compose"
      version_constraint: "Repository deployment configuration"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-ui-server"
  observability_and_evaluation:
    - name: "Provider stream events and token/cost messages"
      version_constraint: "Provider-dependent"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-providers"
    - name: "Workflow status files and UI broadcasts"
      version_constraint: "@openags/app 0.0.6"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-workflow"
  security_and_permissions:
    - name: "File-based users and bearer tokens"
      version_constraint: "@openags/app 0.0.6"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-local-security-boundary"
    - name: "Provider permission modes"
      version_constraint: "Provider-specific"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-provider-permissions"
    - name: "Docker resource and network controls"
      version_constraint: "ExperimentEngine snapshot"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-experiments"
  data_flows:
    - "The React UI sends project, research, artifact, and settings requests to the local REST API."
    - "Chat WebSocket requests are routed to a provider adapter and streamed back as text, tool, result, and completion events."
    - "Workflow agents read directives and write statuses and artifacts in project role folders; filesystem watchers trigger the next orchestration step."
    - "Research routes exchange queries and metadata with arXiv and Semantic Scholar."
    - "Experiment requests may mount a workspace into Docker or cross SSH to a remote host."
  control_flows:
    - "A user starts, pauses, resumes, stops, or intervenes in a project workflow through WebSocket or REST controls."
    - "The orchestrator watches status and directive files, dispatches eligible agents, enforces timeouts, and broadcasts state."
    - "CLI-backed agent sessions are reused per module and run in the module directory."
    - "Terminal WebSockets create or reconnect local PTY sessions and replay buffered output."

