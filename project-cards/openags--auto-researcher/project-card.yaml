open_questions:
  - question: "Is the builtin Python agent backend intentionally removed, external, or pending a TypeScript replacement?"
    reason: "Current callers and documentation reference its routes, but the analyzed server does not register them."
    related_claim_ids:
      - "claim-builtin-gap"
      - "claim-workflow"
  - question: "What deployment boundary is supported beyond the default loopback-only local application?"
    reason: "Powerful REST and WebSocket operations lack general authentication in the analyzed server registration."
    related_claim_ids:
      - "claim-local-security-boundary"
  - question: "What evaluation demonstrates scientific correctness, reproducibility, citation quality, and useful autonomous completion rates?"
    reason: "The targeted static analysis did not include benchmarks or execute a research workflow."
    related_claim_ids:
      - "claim-classification"
      - "claim-maturity"
