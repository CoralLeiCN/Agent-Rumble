project:
  project_id: "project-openags-auto-researcher"
  name: "OpenAGS"
  primary_type: agent_application
  type_rationale: >-
    OpenAGS is primarily a deployable autonomous-science application: it ships
    an Electron/React workspace and a Node.js server that coordinate research
    roles through projects, chats, workflow files, scientific-data tools,
    experiment execution, and manuscript interfaces. Although its README calls
    it a framework and it contains reusable orchestration concepts, the analyzed
    boundary is organized around an end-user research product.
  boundary: >-
    The OpenAGS desktop and browser application, Node.js application server,
    research workflow orchestrator, provider adapters, project templates,
    bundled skills, optional Rust CLI placeholder, tests, and repository-hosted
    documentation in openags/auto-researcher at commit
    9bb9dfc6d5e66ad92e3652c8a2ed250d62f8c11f, one commit after tag v0.0.6.
    Excluded are the source and runtime behavior of Claude Code, Codex, Gemini,
    Copilot, hosted model providers, arXiv, Semantic Scholar, Docker, SSH hosts,
    robots, messaging services, externally linked papers and sites, dependency
    source, issues and pull requests, and all dynamic execution.
  repositories:
    - source_id: "source-openags-repository"
      url: "https://github.com/openags/auto-researcher"
      owner: "openags"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "package.json"
        - "packages/app/"
        - "packages/desktop/"
        - "skills/"
        - "templates/"
        - "cli/"
        - "docs/architecture.md"
        - "docs/workflow-protocol.md"
        - ".github/workflows/"
        - "Dockerfile"
        - "docker-compose.yml"
      excluded_paths:
        - "Translated README duplication"
        - "Binary images and the bundled PDF under docs/"
        - "External agent-provider, model, research API, container, SSH, robot, and messaging implementations"
        - "Third-party dependency source, issues, pull requests, and release binaries"
        - "Runtime execution, dependency installation, network calls, and dynamic security testing"
  packages:
    - "openags 0.0.4 private pnpm workspace root"
    - "@openags/app 0.0.6 Node.js application server"
    - "@openags/desktop 0.0.6 Electron and React application"
    - "openags-cli 0.1.0 Rust package marked as a future CLI in the README"
  services:
    - "Loopback Express HTTP and WebSocket application server"
    - "Electron desktop host and React renderer"
    - "Optional Docker experiment engine"
    - "Optional remote SSH experiment execution"
  documentation_sites:
    - "Repository README and docs/"
  license: "MIT"
  status: active

