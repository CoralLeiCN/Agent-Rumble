summary:
  one_line: >-
    A local desktop and browser application for orchestrating specialized AI
    agents across literature, proposal, experiment, manuscript, and review phases.
  purpose: >-
    OpenAGS provides a research workspace where users create projects, converse
    with selectable CLI-backed agents, automate a file-driven multi-agent
    pipeline, search scholarly sources, manage citations and LaTeX artifacts,
    and optionally run experiments in Docker or on remote hosts.
  target_users:
    - "Researchers evaluating agent-assisted scientific workflows"
    - "Technical teams operating local multi-agent research workspaces"
    - "Developers extending research roles, skills, providers, tools, and templates"
  primary_use_cases:
    - "Coordinate literature, proposal, experiment, manuscript, and review agents"
    - "Run interactive Claude Code, Codex, or Gemini CLI research chats"
    - "Search arXiv and Semantic Scholar and verify citations"
    - "Manage projects, references, LaTeX manuscripts, and version history"
    - "Run bounded Docker experiments or remote SSH commands"
    - "Edit and discover SKILL.md and SOUL.md extensions"

classification:
  secondary_characteristics:
    - "autonomous scientific-research workspace"
    - "file-driven multi-agent application"
    - "desktop and browser application"
    - "multi-provider CLI agent host"
    - "research artifact and experiment workbench"
  domains:
    - "scientific research"
    - "literature review"
    - "experimental computing"
    - "academic writing"
    - "citation management"
  delivery_forms:
    - "Electron desktop application"
    - "React browser interface"
    - "Express HTTP and WebSocket server"
    - "Docker image and Compose configuration"
  agent_patterns:
    - "coordinator and specialized research agents"
    - "file-based task directives and completion statuses"
    - "dependency-ordered pipeline"
    - "refine and pivot decisions"
    - "session resume per research module"
    - "human intervention and wait state"
  architecture_layers:
    - "Electron host and React renderer"
    - "Express REST and WebSocket server"
    - "workflow orchestrator and file protocol"
    - "agent provider adapters"
    - "research tools and artifact services"
    - "local project filesystem"
    - "optional Docker and SSH execution"
  claim_ids:
    - "claim-classification"
    - "claim-workflow"
    - "claim-ui-server"

