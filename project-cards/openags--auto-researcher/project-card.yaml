usage:
  installation: "Clone the repository, run `pnpm install` and `pnpm build`; Node.js 20+ and pnpm 9+ are required."
  minimal_start: >-
    Run the Electron development command for the desktop product, or start
    @openags/app and open its loopback address in a browser; create an account
    and then a research project from the dashboard.
  configuration:
    - "~/.openags/config.yaml or OPENAGS_* environment overrides configure workspace, logging, backend, models, sandbox mode, remote servers, and notifications."
    - "Provider-specific CLI settings and authentication are required for agent chat."
    - "Project templates supply role folders and state files."
  required_services:
    - "At least one agent provider runtime and its hosted model access"
  extension_points:
    - "SKILL.md and SOUL.md files"
    - "Project templates and role folders"
    - "Agent provider adapters"
