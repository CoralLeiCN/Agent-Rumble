architecture:
  overview: >-
    An Electron main process or standalone Node.js entry point starts an Express
    server on loopback. A React UI calls REST endpoints and Shell, Chat, and
    Workflow WebSockets. Provider adapters stream agent events from Claude,
    Codex, or Gemini. A file-driven orchestrator watches project role folders,
    parses directives and status files, and dispatches research phases. Project,
    manuscript, reference, skill, and version services operate on local files;
    experiments optionally cross Docker or SSH trust boundaries.
  languages:
    - "TypeScript 5.6+"
    - "Rust 2021 for the optional future CLI placeholder"
    - "Markdown, YAML, JSON, LaTeX, and BibTeX artifacts"
  frameworks_and_sdks:
    - name: "Express"
      version_constraint: "^5.0.1 in @openags/app"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-metadata"
        - "claim-ui-server"
    - name: "React"
      version_constraint: "^19.0.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-metadata"
        - "claim-ui-server"
    - name: "Electron"
      version_constraint: "33.4.11"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-package-metadata"
        - "claim-ui-server"
    - name: "Zod"
      version_constraint: "^3.23.8"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-metadata"
  model_providers:
    - name: "Anthropic Claude"
      version_constraint: "via @anthropic-ai/claude-agent-sdk ^0.2.79"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-providers"
    - name: "OpenAI Codex"
      version_constraint: "via @openai/codex-sdk ^0.115.0"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-providers"
    - name: "Google Gemini"
      version_constraint: "via locally available Gemini CLI"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-providers"
  runtime_and_orchestration:
    - name: "Node.js"
      version_constraint: ">=20.0.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-metadata"
    - name: "WorkflowOrchestrator"
      version_constraint: "@openags/app 0.0.6 source snapshot"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-workflow"
        - "claim-file-protocol"
  tools_and_mcp:
    tools:
      - name: "arXiv and Semantic Scholar research tools"
        version_constraint: "@openags/app 0.0.6 source snapshot"
        dependency_relation: direct
        required: false
        claim_ids:
          - "claim-research-tools"
      - name: "Provider built-in tools"
        version_constraint: "Selected provider runtime"
        dependency_relation: hosted
        required: false
        claim_ids:
          - "claim-providers"
    mcp_role: client
    mcp_details:
      - "Gemini CLI adapter can pass MCP configuration from ~/.gemini.json."
      - "Provider SDKs may expose their own MCP tools; OpenAGS does not implement a standalone MCP server in the analyzed boundary."
  skills:
    - name: "OpenAGS SKILL.md extensions"
      version_constraint: "Repository and user-authored filesystem format"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-skills"
  memory_and_state:
    - name: "Project role folders and Markdown state files"
      version_constraint: "DIRECTIVE.md, STATUS.md, TASKS.md, memory.md protocol"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-file-protocol"
    - name: "Provider session identifiers"
      version_constraint: "Provider-specific runtime sessions"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-providers"
  retrieval_and_knowledge:
    - name: "arXiv API"
      version_constraint: "Public API behavior at runtime"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-research-tools"
    - name: "Semantic Scholar API"
      version_constraint: "Public API behavior at runtime"
