    configuration_requirements:
      - "Canonical mechanism and component definitions"
      - "Attribution and claim-boundary criteria"
    limitations:
      - "The claim-drift rubric, validator implementation, and false-positive or false-negative behavior were not available."
    confidence: high
    claim_ids:
      - "claim-claim-drift"
      - "claim-auditability-strength"
    evidence_refs:
      - "evidence-claim-drift"
      - "evidence-experiment-validation"

  - capability_id: "capability-report-audit"
    ontology_id: "x-xcientist:report-audit"
