capabilities:
  - capability_id: "capability-paper-graph"
    ontology_id: "x-xcientist:paper-graph"
    name: "Paper Graph Infrastructure"
    description: >-
      Parses full-text computer-science papers into schema-bound problems,
      contributions, components, limitations, innovations, baselines, datasets,
      quotes, and typed method-evolution relations for downstream retrieval and
      validation planning.
    support_status: documented
    evidence_status: documented_only
    scope: "Documented Paper Graph Infrastructure in arXiv:2606.18874v2"
    interfaces:
      - "Topic and seed-paper retrieval"
      - "Graph-backed downstream literature and validation queries"
      - "Semantic Scholar identifiers and citation/reference relations"
    prerequisites:
      - "Computer-science paper corpus"
      - "Semantic Scholar metadata and API access"
      - "MinerU full-text parsing"
      - "Model-backed structured extraction"
    configuration_requirements:
      - "Ideation and experimental extraction schemas"
      - "Entity-resolution and graph-construction rules"
      - "Bounded retrieval and filtering parameters"
    limitations:
      - "The documented corpus is computer-science focused."
      - "Graph source, schemas, extraction prompts, and data were not released in the repository snapshot."
      - "Extraction accuracy and quote fidelity were not independently verified."
    confidence: high
    claim_ids:
      - "claim-paper-graph"
      - "claim-release-state"
    evidence_refs:
      - "evidence-paper-architecture"
      - "evidence-paper-graph-methods"

  - capability_id: "capability-literature-synthesis"
    ontology_id: "x-xcientist:literature-synthesis"
    name: "Graph-grounded literature synthesis"
    description: >-
      Uses DeepSurvey to expand and filter literature, extract full-text keynotes,
      cluster papers, model relations, analyze code repositories, draft surveys,
      enforce citations, and refine outputs at multiple granularities.
    support_status: documented
    evidence_status: documented_only
    scope: "Documented literature review stage"
    interfaces:
      - "Research topic or seed papers"
      - "Structured survey, paper keynotes, comparison tables, relation graphs, and Q&A summaries"
    prerequisites:
      - "Paper Graph and Semantic Scholar access"
      - "Full-text paper retrieval"
      - "DeepSurvey subsystem"
      - "LLM-backed filtering, extraction, drafting, and refinement"
    configuration_requirements:
      - "Topic, seed set, expansion depth, filters, clusters, and outline"
      - "Citation assignment and verification rules"
    limitations:
      - "The paper reports approximately 50,000 indexed computer-science papers, not a general scientific corpus."
      - "Survey and citation quality were not reproduced from released artifacts."
    confidence: high
    claim_ids:
      - "claim-literature-synthesis"
      - "claim-release-state"
    evidence_refs:
      - "evidence-literature-synthesis"

  - capability_id: "capability-structured-ideation"
    ontology_id: "x-xcientist:structured-ideation"
    name: "Structured, evidence-grounded ideation"
    description: >-
      Searches editable idea states under multiple Idea Taste Modes using
      memory-guided MCTS, component-level edit operators, multidimensional
      evaluation, constrained cross-mode fusion, referee review, and local repair.
    support_status: documented
    evidence_status: documented_only
    scope: "Documented idea-generation stage"
    interfaces:
      - "Topic, prepared root context, prior idea, and validation memory"
      - "Structured candidate ideas, fusion metadata, and minimal validation plans"
    prerequisites:
      - "Survey-grounded evidence and graph references"
      - "LLM generator and evaluator"
      - "Vector and symbolic memory from prior trajectories"
    configuration_requirements:
      - "Idea Taste Modes"
      - "MCTS search budget and evaluation rubric"
      - "Root-domain constraints, edit operators, and refinement scope"
    limitations:
      - "Search quality, cost, reproducibility, and sensitivity to evaluator models were not independently tested."
      - "No source, prompt, model configuration, or recorded search tree was available."
    confidence: high
    claim_ids:
      - "claim-ideation"
      - "claim-release-state"
    evidence_refs:
      - "evidence-ideation"

  - capability_id: "capability-experiment-validation"
    ontology_id: "x-xcientist:contract-governed-validation"
    name: "Contract-governed experiment validation"
    description: >-
      Converts an idea into a run-scoped workspace, then gates repository and
      environment preparation, implementation, smoke testing, standard science,
      component-wise ablation, repair, and convergence on independent validator
      reports and real execution artifacts.
    support_status: documented
    evidence_status: documented_only
    scope: "Documented experiment-validation stage"
    interfaces:
      - "Prepared repository, dataset, model, and environment inventory"
      - "Self-contained project code and verification commands"
      - "Standard and ablation result directories"
      - "Machine-readable phase status and convergence artifacts"
    prerequisites:
      - "Permission to clone or inspect repositories and run scientific code"
      - "Datasets, models, compute, environment construction, and command execution"
      - "Worker, validator, scheduler, and run-local workspace"
    configuration_requirements:
      - "Goals, input paths, permitted write roots, required outputs, and done conditions"
      - "Canonical component list and one ablation switch per component"
      - "Repair and master-iteration limits"
    limitations:
      - "The paper documents workspace scoping and optional containers but does not establish a hardened security sandbox."
      - "Validator correctness, benchmark validity, resource use, and full reproducibility were not verified."
    confidence: high
    claim_ids:
      - "claim-experiment-validation"
      - "claim-execution-risk"
      - "claim-release-state"
    evidence_refs:
