architecture:
  overview: >-
    The paper documents three top-level layers. Paper Graph Infrastructure turns
    full-text papers into a typed method-evolution evidence graph. The Research
    Harness connects DeepSurvey-based literature review, structured MCTS
    ideation, contract-governed experiment validation, repair, claim audit, and
    report writing. A topic-centric frontend and orchestration backend expose
    persistent run state, artifacts, events, messages, traces, and approvals over
    REST and WebSocket interfaces. Deployment is described as single-host with a
    relational database, local filesystem artifacts, run-local workspaces, and
    optional containerized stage execution. None of these implementation details
    could be confirmed from released code.
  languages:
    - "JSON and Markdown documented for artifacts and contracts"
  frameworks_and_sdks:
    - name: "DeepSurvey"
      version_constraint: "arXiv:2605.29522"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-literature-synthesis"
  model_providers: []
  runtime_and_orchestration:
    - name: "Xcientist Research Harness"
      version_constraint: null
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-classification"
        - "claim-experiment-validation"
    - name: "Master scheduler and stage controller"
      version_constraint: null
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-experiment-validation"
        - "claim-deployment-scope"
  tools_and_mcp:
    tools:
      - name: "Semantic Scholar API and Open Data Platform"
        version_constraint: null
        dependency_relation: hosted
        required: true
        claim_ids:
          - "claim-paper-graph"
          - "claim-literature-synthesis"
      - name: "Repository acquisition and code-analysis workers"
        version_constraint: null
        dependency_relation: bundled
        required: true
