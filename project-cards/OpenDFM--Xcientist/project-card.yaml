summary:
  one_line: >-
    A documented AI-science research harness that preserves literature evidence,
    structured ideas, validator-gated experiments, repair traces, ablations, and
    audited claims as an inspectable research trajectory.
  purpose: >-
    Xcientist aims to make AI-assisted scientific discovery more attributable
    and governable by externalizing research synthesis and experimental
    validation into persistent artifacts, explicit contracts, independent
    validation gates, bounded repair, and user-visible inspection surfaces.
  target_users:
    - "AI-for-science researchers"
    - "Researchers studying autonomous scientific agents"
    - "Teams that need inspectable literature, ideation, experiment, and reporting trails"
    - "Reviewers or operators supervising long-horizon AI-assisted research runs"
  primary_use_cases:
    - "Build graph-grounded literature reviews and method-evolution analyses"
    - "Generate and refine structured research ideas under novelty, feasibility, and validation constraints"
    - "Prepare, implement, run, validate, ablate, and repair scientific experiments"
    - "Audit whether implementations and empirical evidence support generated claims"
    - "Inspect run state, artifacts, messages, traces, approvals, and failures through a web interface"

