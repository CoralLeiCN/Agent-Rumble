project:
  project_id: "project-opendfm-xcientist"
  name: "Xcientist"
  primary_type: agent_harness_runtime
  type_rationale: >-
    Xcientist is documented as a research harness that coordinates multiple
    agentic stages across literature synthesis, structured ideation, experiment
    execution and validation, reporting, and user inspection. Its central
    product boundary is the governed runtime and artifact trail around AI-assisted
    scientific discovery, rather than one domain-specific agent or a general SDK
    intended to construct unrelated agent applications. This classification is
    based on first-party documentation only because no implementation source was
    present in the repository snapshot.
  boundary: >-
    The logical Xcientist research harness as described by the public
    OpenDFM/Xcientist repository at commit
    d72410e703338f3f8e82b2a790338f47cb89ee76 and the repository-linked paper
    arXiv:2606.18874v2. The repository snapshot contains only README.md; therefore
    the paper is included as first-party project documentation for intended and
    reported architecture, capabilities, experiments, interfaces, and constraints.
    Excluded are unreleased source code and documentation, the private/internal
    deployment, underlying model-provider behavior, the 50,000-paper corpus,
    experiment workspaces and datasets, DeepSurvey and MinerU source, Semantic
    Scholar internals, generated research artifacts, and all runtime verification.
  repositories:
    - source_id: "source-xcientist-repository"
      url: "https://github.com/OpenDFM/Xcientist"
      owner: "OpenDFM"
      role: primary
      included_paths:
        - "README.md"
      excluded_paths:
        - "Unreleased cleaned code and documentation"
        - "Internal frontend, backend, database, workspaces, prompts, configuration, and deployment"
        - "External paper corpus, datasets, models, repositories, and generated artifacts"
        - "Issues, pull requests, discussions, and community metadata"
  packages: []
  services:
    - "Documented topic-centric web frontend"
    - "Documented orchestration backend with REST and WebSocket interfaces"
    - "Documented relational persistence and local artifact storage"
    - "Documented containerized stage-execution environment"
  documentation_sites:
    - "https://kotohanon.github.io/Xcientist/"
    - "https://arxiv.org/abs/2606.18874"
  license: null
  status: active

