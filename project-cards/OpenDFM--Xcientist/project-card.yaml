    description: >-
      Maps experiment code, results, literature, citations, and planned figures
      into a report, scores source fidelity and research integrity, repairs
      verified issues, and checkpoints progress for resumability.
    support_status: documented
    evidence_status: documented_only
    scope: "Documented report-writing stage"
    interfaces:
