  - capability_id: "capability-claim-drift-audit"
    ontology_id: "x-xcientist:claim-drift-audit"
    name: "Claim drift detection and boundary control"
    description: >-
      Compares a proposed mechanism with executable implementation, ablation or
      diagnostic evidence, and final claim text, then bounds or revises claims
      when evidence cannot attribute outcomes to the claimed mechanism.
    support_status: documented
    evidence_status: documented_only
    scope: "Documented cross-stage research-audit behavior"
    interfaces:
