    - name: "CrewAI CLI"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-package-surface"
  deployment:
    - name: "Operator-managed Python process"
      version_constraint: "Python >=3.10,<3.14"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-surface"
  observability_and_evaluation:
    - name: "OpenTelemetry"
      version_constraint: "~=1.42.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-checkpoint-tracing"
  security_and_permissions:
    - name: "CrewAI fingerprint configuration"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-security-scope"
  data_flows:
    - "Application inputs are interpolated into tasks and agent context, then agents call configured LLMs and optional tools to produce task outputs."
    - "Crew execution dispatches tasks sequentially or through a manager-led hierarchical process and aggregates CrewOutput plus usage metrics."
    - "Flows hydrate state and inputs, execute start methods, emit events, trigger listeners and routers, optionally persist snapshots, and return the last result."
    - "Memory analyzes and embeds records into pluggable storage; recall results are added to agent prompts."
    - "Knowledge sources are chunked and stored for vector search, with retrieved context added before agent execution."
    - "MCP and A2A connections send tool arguments, prompts, messages, and task context across deployment trust boundaries."
  control_flows:
    - "Crew.kickoff selects Process.sequential or Process.hierarchical and rejects other process values."
    - "Agent executors iterate model calls and tool use up to configured iteration, time, and request limits."
    - "Flow @start methods initiate execution; @listen and @router conditions schedule downstream methods and route labels."
    - "Checkpoint configuration can restore a Crew or Flow before normal kickoff; Flow persistence is a separate state mechanism."

