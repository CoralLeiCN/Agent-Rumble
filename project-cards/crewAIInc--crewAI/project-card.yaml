project:
  project_id: "project-crewaiinc-crewai"
  name: "CrewAI"
  primary_type: agent_framework_sdk
  type_rationale: >-
    CrewAI is primarily a Python framework and SDK for developers to construct
    agent systems. Its public primitives model role-based agents, tasks, Crews,
    and event-driven Flows, while tool, memory, knowledge, skills, MCP, A2A,
    checkpointing, and tracing APIs provide supporting runtime capabilities.
    The repository contains examples and developer tooling, but it is not one
    fixed end-user agent application.
  boundary: >-
    The open-source Python packages, CLI, repository-hosted documentation,
    tests, and automation in crewAIInc/crewAI at commit
    69c0308f2cf4fa17214eab4db10071abc08602fd (tag 1.15.4). The logical
    project includes the crewai, crewai-core, crewai-cli, crewai-tools, and
    crewai-files workspace packages because they are versioned and developed
    together as the framework distribution. Static inspection only was used.
    Excluded are CrewAI AMP, the hosted Crew Control Plane and app, external
    examples repositories, official skills in crewAIInc/skills, third-party
    services and package internals, issues and pull requests, and all runtime
    behavior.
  repositories:
    - source_id: "source-crewai-repository"
      url: "https://github.com/crewAIInc/crewAI"
      owner: "crewAIInc"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "pyproject.toml"
        - "uv.lock"
        - "lib/crewai/"
        - "lib/crewai-core/"
        - "lib/cli/"
        - "lib/crewai-tools/"
        - "lib/crewai-files/"
        - "docs/edge/en/"
        - ".github/workflows/"
      excluded_paths:
        - "Frozen non-English and historical documentation snapshots beyond representative mapping"
        - "Binary images and test cassette payload contents"
        - "CrewAI AMP, hosted control plane, and app.crewai.com behavior"
        - "crewAIInc/crewAI-examples and crewAIInc/skills repositories"
        - "Third-party provider, MCP server, tool, and storage implementations"
        - "Issues, pull requests, discussions, and community metadata"
  packages:
    - "crewai 1.15.4"
    - "crewai-core 1.15.4"
    - "crewai-cli 1.15.4"
    - "crewai-tools 1.15.4"
    - "crewai-files 1.15.4"
  services: []
  documentation_sites:
    - "https://docs.crewai.com (published from repository docs/)"
  license: "MIT"
  status: active

