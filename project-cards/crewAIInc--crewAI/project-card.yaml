usage:
  installation: "Install with `uv pip install crewai`; use `uv pip install 'crewai[tools]'` for the optional tools package."
  minimal_start: >-
    Run `crewai create crew <project_name>`, define agents and tasks in YAML or
    Python, construct a Crew with a Process, then call `crewai run` or
    `Crew.kickoff(inputs=...)`. Flows subclass Flow and decorate methods with
    @start, @listen, and @router before calling kickoff.
  configuration:
    - "Agent role, goal, backstory, model, tools, memory, knowledge, skills, and delegation behavior"
    - "Task description, expected output, dependencies, guardrails, and structured-output model"
    - "Crew process, planning, callbacks, checkpointing, tracing, and model defaults"
    - "Flow state, trigger conditions, persistence, input provider, and checkpointing"
    - "Provider, tool, MCP, A2A, storage, and observability credentials"
  required_services:
    - "At least one selected LLM provider or compatible local endpoint"
    - "Any external APIs, MCP servers, A2A agents, storage services, or tools selected by the application"
  extension_points:
    - "Custom BaseAgent and agent executors"
    - "BaseTool and structured tools"
    - "Crew callbacks, hooks, event listeners, and guardrails"
    - "Flow methods, declarative Flow Definitions, routers, persistence, and input providers"
    - "LLM providers and compatible endpoints"
    - "Memory storage and embedding providers"
    - "Knowledge sources and storage"
    - "Agent Skills, MCP servers, and A2A agents"

assessment:
  contexts:
    - context_id: "context-crewai-framework-evaluation"
      use_case: >-
        Selecting an open-source Python framework for multi-agent applications
        that need both autonomous agent collaboration and explicit workflow
        control, with static inspection as the only verification method.
      comparison_cohort:
        - "Open-source Python agent frameworks and SDKs"
        - "Graph and event-driven agent workflow runtimes"
        - "Multi-agent orchestration libraries"
      requirements:
        - "Composable agents, tasks, tools, and structured outputs"
        - "Multi-agent and deterministic workflow orchestration"
        - "State, memory, retrieval, checkpoint, and observability options"
        - "Extensible provider and protocol integrations"
        - "Clear operator control over external effects and data movement"
      organizational_constraints:
        - "Python 3.10-3.13 application environment"
        - "Static repository evidence only; no production deployment evidence"
        - "Hosted CrewAI AMP is outside the evaluated boundary"
        - "External providers, tools, and remote agents require separate security and compliance review"
      assessed_at: "2026-07-18T13:24:00Z"
  maturity: established
  maturity_signals:
    - statement: "The framework is established within the inspected open-source scope."
      reasoning: >-
        The repository is at tag 1.15.4, has versioned packages and documentation,
        a broad Python 3.10-3.13 CI matrix, extensive tests, linting and typing
        configuration, and a scheduled vulnerability workflow. No runtime or
        operational reliability evidence was collected, so this does not support
        a stronger universal maturity judgment.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-established"
        - "claim-test-automation"
  strengths:
    - statement: "CrewAI combines autonomous multi-agent collaboration and explicit event-driven workflow control in one Python framework."
      reasoning: >-
        Crews expose role-based agents and sequential or hierarchical processes,
        while Flows expose state, start/listen/router triggers, persistence, and
        synchronous or asynchronous execution.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-framework-breadth"
    - statement: "The inspected runtime has broad extension surfaces for tools, protocols, memory, knowledge, skills, events, and providers."
      reasoning: >-
        Separate APIs and packages cover custom tools, MCP, A2A, skills, memory,
        knowledge, model adapters, callbacks, hooks, and event listeners.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-framework-breadth"
  limitations:
    - statement: "The open-source framework does not by itself establish the hosted deployment, governance, and operational assurances described for CrewAI AMP."
      reasoning: >-
        The README distinguishes commercial AMP control-plane capabilities from
        the open-source framework, and those hosted systems were excluded from
        this project boundary.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-hosted-boundary"
    - statement: "Several integrations are optional and require external providers, services, packages, credentials, or executable MCP commands."
      reasoning: >-
        The package manifest and integration code expose optional extras and
        remote boundaries rather than a self-contained deployment.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-execution-boundary"
  risks:
    - statement: "Configured tools, skills, MCP servers, and A2A agents can move untrusted content or actions across application trust boundaries."
      reasoning: >-
        Agents can invoke local or remote tools, Skill instructions are formatted
        into agent context, stdio MCP configuration can launch commands, and A2A
        delegates tasks to remote agents. Effective permissions and isolation are
        application and deployment responsibilities.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-execution-boundary"
    - statement: "Tracing and memory can retain sensitive prompts, decisions, tool details, or retrieved content if enabled without data-governance controls."
      reasoning: >-
        The inspected tracing UI describes agent decisions, task flow, timing,
        and tool details, while memory persists analyzed records in storage.
      context_id: "context-crewai-framework-evaluation"
      confidence: medium
      claim_ids:
        - "claim-checkpoint-tracing"
        - "claim-memory-knowledge"
  best_fit:
    - statement: "Python teams that want role-based agent collaboration plus deterministic, stateful workflow control in one framework."
      reasoning: "The Crew and Flow abstractions directly address both requirements and can be composed."
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-framework-breadth"
    - statement: "Applications needing selectable model providers and extensibility through tools, MCP, A2A, skills, memory, and knowledge."
      reasoning: "The repository provides explicit integration surfaces for each of these categories."
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-framework-breadth"
  poor_fit:
    - statement: "Organizations seeking a turnkey hosted control plane, governance product, or security assurance solely from this open-source package boundary."
      reasoning: "Those commercial hosted capabilities are explicitly separate and were not evaluated."
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-hosted-boundary"
    - statement: "Deployments unable to review and constrain third-party model, tool, MCP, A2A, storage, and telemetry boundaries."
      reasoning: "Many useful capabilities depend on externally configured code or services with their own permissions and data paths."
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-execution-boundary"
  gaps:
    - statement: "The inspected SecurityConfig does not implement the authentication, scoping, or impersonation controls named in its own documentation."
      reasoning: >-
        The source marks authentication, scoping rules, and delegation tokens as
        TODO and currently exposes a fingerprint field. This is a gap for the
        assessment context's operator-control requirement, not a claim about AMP.
      context_id: "context-crewai-framework-evaluation"
      confidence: high
      claim_ids:
        - "claim-security-scope"

