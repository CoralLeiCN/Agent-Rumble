summary:
  one_line: >-
    A Python agent framework combining autonomous, role-based multi-agent Crews
    with stateful, event-driven Flows and extensible tools, memory, knowledge,
    skills, MCP, and A2A integrations.
  purpose: >-
    CrewAI provides application developers with high- and low-level primitives
    for composing agents, tasks, and deterministic Python workflow logic into
    multi-step agentic automations.
  target_users:
    - "Python developers building agentic applications"
    - "Teams coordinating multiple role-specialized agents"
    - "Automation engineers mixing LLM decisions with deterministic workflow logic"
    - "Platform teams integrating tools, memory, knowledge, MCP, and A2A endpoints"
  primary_use_cases:
    - "Coordinate role-based agents and tasks in sequential or hierarchical Crews"
    - "Build event-driven Flows with state, listeners, conditions, and routing"
    - "Connect agents to Python tools, MCP servers, external agents, and model providers"
    - "Add memory, retrieval-backed knowledge, skills, checkpointing, and tracing"
    - "Scaffold and run agent projects through the CrewAI CLI"

classification:
  secondary_characteristics:
    - "multi-agent orchestration framework"
    - "event-driven agent workflow runtime"
    - "Python-native SDK and CLI"
    - "tool and protocol integration layer"
    - "stateful agent runtime"
  domains:
    - "general-purpose agentic automation"
    - "multi-agent systems"
    - "business process automation"
    - "developer tooling"
  delivery_forms:
    - "Python packages"
    - "Python API"
    - "command-line interface"
    - "repository-hosted documentation"
  agent_patterns:
    - "role-based agent teams"
    - "sequential task orchestration"
    - "manager-led hierarchical orchestration"
    - "tool-using iterative agents"
    - "event-driven workflows"
    - "conditional routing"
    - "agent-to-agent delegation"
  architecture_layers:
    - "CLI and Python authoring APIs"
    - "Crew, Agent, and Task orchestration"
    - "Flow DSL and asynchronous runtime"
    - "model-provider and structured-output adapters"
    - "tool, MCP, and A2A interoperability"
    - "memory, knowledge, and storage"
    - "events, checkpointing, and tracing"
  claim_ids:
    - "claim-classification"
    - "claim-crews"
    - "claim-flows"
    - "claim-agent-tools"
    - "claim-mcp"
    - "claim-a2a"

capabilities:
  - capability_id: "capability-crews"
    ontology_id: "x-crewai:multi-agent-crews"
    name: "Role-based multi-agent Crews"
    description: >-
      Defines agents and tasks as a Crew and executes them through sequential or
      manager-led hierarchical processes, with delegation and callbacks available
      through the agent and crew APIs.
    support_status: statically_confirmed
    scope: "Crew, Agent, Task, Process, and kickoff APIs in the crewai package"
    interfaces:
      - "Crew(...).kickoff(inputs=...)"
      - "Crew.kickoff_async(...)"
      - "Crew.kickoff_for_each(...)"
      - "Agent.execute_task(...)"
    prerequisites:
      - "Python 3.10 through 3.13"
      - "A configured supported LLM or compatible endpoint"
      - "Credentials for selected model providers and tools"
    configuration_requirements:
      - "Agents, tasks, and a Process"
      - "Role, goal, backstory, and task expected outputs"
      - "Provider-specific model credentials"
    limitations:
      - "Only sequential and hierarchical processes are dispatched by Crew.kickoff at this snapshot."
      - "Autonomy, delegation quality, and concurrency behavior were not runtime verified."
    confidence: high
    claim_ids:
      - "claim-crews"
      - "claim-agent-tools"
    evidence_refs:
      - "evidence-readme-framework"
      - "evidence-crew-process-dispatch"
      - "evidence-base-agent-contract"

  - capability_id: "capability-flows"
    ontology_id: "x-crewai:event-driven-flows"
    name: "Event-driven Flows"
    description: >-
      Authors stateful workflows with start, listen, and router decorators and
      executes them synchronously or asynchronously with optional persistence,
      restoration, checkpointing, and streaming.
    support_status: statically_confirmed
    scope: "crewai.flow DSL, Flow Definition, and runtime"
    interfaces:
      - "Flow subclasses"
      - "@start, @listen, @router, or_, and_"
      - "Flow.kickoff(...) and Flow.kickoff_async(...)"
      - "Flow.from_declaration(...)"
    prerequisites:
      - "Python 3.10 through 3.13"
      - "Application-defined Flow methods or a Flow Definition"
    configuration_requirements:
      - "Start methods and downstream trigger conditions"
      - "Optional state model, persistence, input provider, and checkpoint configuration"
    limitations:
      - "Flow execution, persistence recovery, and concurrent event behavior were not runtime verified."
      - "Some conversational Flow behavior is explicitly marked experimental in source."
    confidence: high
    claim_ids:
      - "claim-flows"
      - "claim-checkpoint-tracing"
    evidence_refs:
      - "evidence-readme-crews-flows"
      - "evidence-flow-runtime"
      - "evidence-flow-dsl"

  - capability_id: "capability-tools"
    ontology_id: "x-crewai:agent-tools-and-delegation"
    name: "Agent tools, structured outputs, and delegation"
    description: >-
      Gives agents typed tools, iteration and time limits, optional delegation,
      provider-specific tool calling, and Pydantic or JSON-oriented output paths.
    support_status: statically_confirmed
    scope: "BaseAgent and Agent execution surfaces plus optional crewai-tools package"
    interfaces:
      - "Agent(tools=[...], allow_delegation=...)"
      - "BaseTool and CrewStructuredTool"
      - "Task output_pydantic and output_json"
      - "Optional crewai-tools integrations"
    prerequisites:
      - "A configured LLM"
      - "Tool-specific packages, services, credentials, and permissions"
    configuration_requirements:
      - "Explicit tool instances or integrations"
      - "Per-tool input schemas and credentials"
    limitations:
      - "Tool side effects and permissions are defined by each tool and deployment."
      - "The former built-in CodeInterpreterTool path is deprecated and returns no execution tools."
    confidence: high
    claim_ids:
      - "claim-agent-tools"
      - "claim-package-surface"
      - "claim-execution-boundary"
    evidence_refs:
      - "evidence-base-agent-contract"
      - "evidence-agent-execution-boundary"
      - "evidence-code-execution-deprecated"
      - "evidence-package-manifest"

  - capability_id: "capability-mcp"
    ontology_id: "x-crewai:mcp-client"
    name: "MCP client tool integration"
    description: >-
      Connects agents to MCP servers over stdio, Streamable HTTP, or SSE,
      resolves remote tool schemas into CrewAI tools, filters tool lists, and
      manages client cleanup.
    support_status: statically_confirmed
    scope: "crewai.mcp configuration, transports, client, and tool resolver"
    interfaces:
      - "Agent(mcps=[...])"
      - "MCPServerStdio"
      - "MCPServerHTTP"
      - "MCPServerSSE"
    prerequisites:
      - "mcp Python package"
      - "A reachable MCP server or executable command"
      - "Server-specific credentials and authorization"
    configuration_requirements:
      - "Transport command or URL"
      - "Optional headers, environment variables, tool filters, and cache behavior"
    limitations:
      - "CrewAI acts as an MCP client in the inspected open-source runtime; no general MCP server surface was confirmed."
      - "Remote tool trust, authorization, and side effects remain deployment concerns."
    confidence: high
    claim_ids:
      - "claim-mcp"
      - "claim-execution-boundary"
    evidence_refs:
      - "evidence-mcp-config"
      - "evidence-mcp-resolver"

  - capability_id: "capability-a2a"
    ontology_id: "x-crewai:a2a-interoperability"
    name: "A2A agent delegation"
    description: >-
      Wraps agent task and kickoff methods so configured remote A2A agents can be
      discovered from Agent Cards and participate in synchronous or asynchronous
      delegation.
    support_status: statically_confirmed
    scope: "Optional a2a extra and crewai.a2a package"
    interfaces:
      - "Agent a2a configuration"
      - "Wrapped execute_task and aexecute_task"
      - "Wrapped kickoff and kickoff_async"
    prerequisites:
      - "crewai[a2a] optional dependencies"
      - "Reachable A2A endpoints with compatible Agent Cards"
    configuration_requirements:
      - "A2A client or server configuration"
      - "Authentication and timeout settings where required"
    limitations:
      - "Protocol interoperability and remote-agent behavior were not exercised."
      - "Remote agents expand the deployment trust boundary."
    confidence: high
    claim_ids:
      - "claim-a2a"
      - "claim-execution-boundary"
    evidence_refs:
      - "evidence-a2a-wrapper"
      - "evidence-package-manifest"

  - capability_id: "capability-memory-knowledge"
    ontology_id: "x-crewai:memory-and-knowledge"
    name: "Memory and retrieval-backed knowledge"
    description: >-
      Provides a unified, scoped memory abstraction with LLM-assisted analysis
      and pluggable storage, plus vector-backed knowledge sources for strings,
      text, PDF, CSV, Excel, JSON, and Docling content.
    support_status: statically_confirmed
    scope: "crewai.memory, crewai.knowledge, and crewai.rag packages"
    interfaces:
      - "Crew(memory=True or Memory(...))"
      - "Agent and Crew knowledge_sources"
      - "Knowledge.query(...) and Knowledge.aquery(...)"
    prerequisites:
      - "Embedding model or provider"
      - "LLM for default memory analysis"
      - "Storage and document-processing dependencies required by selected sources"
    configuration_requirements:
      - "Memory storage, embedder, and optional scope settings"
      - "Knowledge source types and collection name"
    limitations:
      - "The default memory configuration uses an OpenAI model and embedder unless overridden."
      - "Retrieval quality, data isolation, persistence durability, and concurrent writes were not runtime verified."
    confidence: high
    claim_ids:
      - "claim-memory-knowledge"
      - "claim-package-surface"
    evidence_refs:
      - "evidence-memory"
      - "evidence-knowledge"
      - "evidence-package-manifest"

  - capability_id: "capability-skills"
    ontology_id: "x-crewai:agent-skills"
    name: "Agent Skills loading"
    description: >-
      Discovers SKILL.md directories, inline skill definitions, and registry
      references, progressively loads instructions and resources, and formats
      selected skills into agent context.
    support_status: statically_confirmed
    scope: "crewai.skills and Agent or Crew skills configuration"
    interfaces:
      - "Agent(skills=[...])"
      - "Crew(skills=[...])"
      - "Filesystem paths, inline SKILL.md strings, Skill objects, and @org/name references"
    prerequisites:
      - "Valid SKILL.md frontmatter or a reachable configured registry for registry references"
    configuration_requirements:
      - "Skill search path, inline content, object, or registry reference"
    limitations:
      - "Skill content is injected into model context and must be treated as untrusted application data."
      - "Registry retrieval and resource use were not analyzed dynamically."
    confidence: high
    claim_ids:
      - "claim-skills"
      - "claim-execution-boundary"
    evidence_refs:
      - "evidence-skills-loader"

  - capability_id: "capability-checkpoint-tracing"
    ontology_id: "x-crewai:checkpointing-and-tracing"
    name: "Checkpointing, events, and tracing"
    description: >-
      Emits runtime events, can restore Crew and Flow executions from checkpoints,
      and instruments execution through OpenTelemetry-based tracing hooks.
    support_status: statically_confirmed
    scope: "Crew and Flow checkpoint APIs, event bus, and tracing listeners"
    interfaces:
      - "Crew.from_checkpoint(...)"
      - "Crew.kickoff(from_checkpoint=...)"
      - "Flow.kickoff(from_checkpoint=...)"
      - "tracing configuration and event listeners"
    prerequisites:
      - "Writable checkpoint or persistence storage when enabled"
      - "Optional trace destination and user configuration"
    configuration_requirements:
      - "CheckpointConfig or checkpoint=True"
      - "Tracing override, environment, or user choice"
    limitations:
      - "Recovery guarantees and exported trace behavior were not runtime verified."
      - "Trace content can include agent decisions, task flow, and tool details and therefore requires data-governance review."
    confidence: high
    claim_ids:
      - "claim-checkpoint-tracing"
      - "claim-execution-boundary"
    evidence_refs:
      - "evidence-crew-checkpoint-tracing"
      - "evidence-flow-runtime"
      - "evidence-tracing-prompt"

architecture:
  overview: >-
    A Python monorepo exposes Agent, Task, and Crew models for autonomous
    collaboration and a separate Flow DSL/runtime for explicit event-driven
    control. Provider adapters supply LLM calls and structured outputs; tools,
    MCP, A2A, skills, memory, and knowledge extend agent context and actions.
    A shared event bus, checkpoint state, and OpenTelemetry instrumentation span
    the runtime. Optional hosted AMP integrations are outside this card boundary.
  languages:
    - "Python 3.10-3.13"
    - "YAML and JSON configuration"
  frameworks_and_sdks:
    - name: "Pydantic"
      version_constraint: ">=2.11.9,<2.13"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-surface"
    - name: "OpenTelemetry API and SDK"
      version_constraint: "~=1.42.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-checkpoint-tracing"
  model_providers:
    - name: "OpenAI Python SDK"
      version_constraint: ">=2.30.0,<3"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-surface"
    - name: "Anthropic Python SDK"
      version_constraint: "~=0.73.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-package-surface"
    - name: "Google Gen AI SDK"
      version_constraint: "~=1.65.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-package-surface"
  runtime_and_orchestration:
    - name: "CrewAI Crew and Agent runtime"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-crews"
        - "claim-agent-tools"
    - name: "CrewAI Flow runtime"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-flows"
  tools_and_mcp:
    tools:
      - name: "crewai-tools"
        version_constraint: "1.15.4"
        dependency_relation: optional
        required: false
        claim_ids:
          - "claim-agent-tools"
      - name: "MCP Python SDK"
        version_constraint: "~=1.28.1"
        dependency_relation: direct
        required: true
        claim_ids:
          - "claim-mcp"
      - name: "A2A Python SDK"
        version_constraint: "~=0.3.10"
        dependency_relation: optional
        required: false
        claim_ids:
          - "claim-a2a"
    mcp_role: client
    mcp_details:
      - "Native stdio, Streamable HTTP, and SSE client transports"
      - "Tool-schema discovery, filtering, wrapping, invocation, caching, and cleanup"
      - "No general open-source MCP server role was confirmed at targeted depth"
  skills:
    - name: "CrewAI Agent Skills loader"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-skills"
  memory_and_state:
    - name: "CrewAI unified Memory"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-memory-knowledge"
    - name: "LanceDB"
      version_constraint: ">=0.29.2,<0.30.1"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-memory-knowledge"
    - name: "aiosqlite"
      version_constraint: "~=0.21.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-checkpoint-tracing"
  retrieval_and_knowledge:
    - name: "CrewAI Knowledge and RAG"
      version_constraint: "1.15.4"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-memory-knowledge"
    - name: "ChromaDB"
      version_constraint: "~=1.1.0"
      dependency_relation: direct
      required: true
      claim_ids:
