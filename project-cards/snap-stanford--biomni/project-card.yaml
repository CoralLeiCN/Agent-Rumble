project:
  project_id: "project-snap-stanford-biomni"
  name: "Biomni"
  primary_type: agent_application
  type_rationale: >-
    Biomni is primarily a runnable biomedical agent application exposed through
    the A1 Python class and an optional Gradio interface. Its main behavior is a
    task-oriented generate/execute loop that retrieves resources and runs
    biomedical tools or generated code. It offers extension APIs and MCP
    interoperability, but it is not primarily a general-purpose agent framework
    or SDK for constructing unrelated agent systems.
  boundary: >-
    The Biomni open-source Python agent, bundled biomedical tool descriptions and
    implementations, resource catalogs, know-how documents, environment setup,
    evaluation adapter, MCP examples, and repository documentation contained in
    the single public snap-stanford/biomni repository at commit
    400c1f366b96a35ca253e13c9b06c5076af41d65. Included source is inspected only
    as static evidence. Excluded are the hosted biomni.stanford.edu platform,
    Biomni-R0 model weights and serving stack, the hosted Biomni-Eval1 dataset,
    the approximately 11 GB downloadable data lake, external databases and APIs,
    third-party package or tool source, repository issues and pull requests, and
    all runtime behavior.
  repositories:
    - source_id: "source-biomni-repository"
      url: "https://github.com/snap-stanford/biomni"
      owner: "snap-stanford"
      role: primary
      included_paths:
        - "README.md"
        - "DETAILS.md"
        - "CONTRIBUTION.md"
        - "LICENSE"
        - "pyproject.toml"
        - ".env.example"
        - "biomni/agent/"
        - "biomni/model/"
        - "biomni/tool/"
        - "biomni/know_how/"
        - "biomni/eval/"
        - "biomni/task/"
        - "biomni/config.py"
        - "biomni/llm.py"
        - "biomni/utils.py"
        - "biomni/env_desc.py"
        - "biomni/env_desc_cm.py"
        - "biomni/version.py"
        - "biomni_env/"
        - "docs/"
        - "tutorials/examples/"
      excluded_paths:
        - "tutorials/biomni_101.ipynb binary notebook content"
        - "figs/ binary image content"
        - "biomni/tool/schema_db/ bundled pickle contents"
        - "biomni/tool/protocols/ full protocol-document corpus"
        - "Hosted web application and services"
        - "External model, dataset, database, API, package, and CLI-tool implementations"
        - "Issues, pull requests, discussions, and community metadata"
  packages:
    - "biomni 0.0.8 Python package"
  services:
    - "Optional local Gradio web interface"
    - "Optional stdio MCP server exposing selected Biomni tools"
  documentation_sites:
    - "Repository-hosted documentation under docs/"
  license: "Apache-2.0"
  status: active

