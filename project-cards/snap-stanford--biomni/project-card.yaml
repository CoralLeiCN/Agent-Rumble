    project_type: agent_application
    purpose: "Initializes resources and implements the primary biomedical agent workflow and public interfaces."
    claim_ids:
      - "claim-agent-loop"
      - "claim-resource-selection"
      - "claim-user-interfaces"
  - component_id: "component-llm-factory"
    name: "LLM provider factory"
    path: "biomni/llm.py"
    project_type: "model gateway adapter"
    purpose: "Selects hosted, local, and OpenAI-compatible LangChain chat-model adapters."
    claim_ids:
      - "claim-model-providers"
  - component_id: "component-resource-selection"
    name: "Resource retriever and registries"
    path: "biomni/model/retriever.py; biomni/tool/tool_registry.py"
    project_type: "retrieval and registry component"
    purpose: "Selects and indexes tools, data, software, and know-how for task context."
    claim_ids:
