architecture:
  overview: >-
    A1 initializes catalogs and an LLM adapter, optionally downloads external
    resource data, and compiles a LangGraph state machine. For each task, an
    LLM-based retriever selects tools, data, software, and know-how. The agent
    then alternates between generation and local execution until it emits a
    solution, with in-process state and optional self-critique. MCP and Gradio
    provide additional integration and interaction surfaces.
  languages:
    - "Python 3.11 or later"
    - "R for generated scripts and environment packages"
    - "Bash and command-line tools"
  frameworks_and_sdks:
    - name: "LangGraph"
      version_constraint: "==0.3.18 in biomni_env/environment.yml"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-agent-loop"
    - "LangChain"
    - "Pydantic"
    - name: "Gradio"
      version_constraint: ">=5.0,<6.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-user-interfaces"
    - "MCP Python SDK"
  model_providers:
    - "Anthropic through langchain-anthropic"
    - "OpenAI and Azure OpenAI through langchain-openai"
    - "Gemini and Groq through OpenAI-compatible endpoints"
    - "Ollama through langchain-ollama"
    - "AWS Bedrock through optional langchain-aws"
    - "Custom OpenAI-compatible endpoints"
  runtime_and_orchestration:
    - "LangGraph StateGraph generate/execute workflow"
    - "Optional self-critic loop and test-time scaling rounds"
    - "LangGraph MemorySaver in-process checkpointer"
    - "Persistent in-process Python execution namespace"
  tools_and_mcp:
    tools:
      - "Biomedical Python tool modules grouped by scientific domain"
      - "Declarative tool-description registry"
      - "Generated Python, R, Bash, and CLI execution"
      - "External stdio MCP tools"
    mcp_role: both
    mcp_details:
      - "Client mode starts configured stdio MCP servers, discovers tools, and wraps calls synchronously."
      - "Server mode exposes selected Biomni modules using FastMCP over stdio."
  skills:
    - "Bundled biomedical Know-How Library with metadata and commercial-use filtering"
  memory_and_state:
    - "LangGraph MemorySaver"
    - "In-process conversation state and execution log"
    - "In-process custom tool, data, and software registries"
  retrieval_and_knowledge:
    - "LLM prompt-based resource selection"
    - "Bundled biomedical tool descriptions"
    - "Downloadable biomedical data-lake catalog"
    - "Biomedical software-library catalog"
    - "Bundled know-how documents"
  document_processing:
    - "Markdown conversation-history generation"
    - "Optional PDF conversion through available local converters"
  execution_and_sandbox:
    - "Persistent Python exec namespace"
    - "Rscript and Bash subprocess helpers"
    - "Configurable execution timeout"
    - "No sandbox; execution has host user permissions"
  gateways_and_routing:
    - "LangChain chat-model provider adapters"
    - "OpenAI-compatible routing for Gemini, Groq, and custom endpoints"
    - "LLM-based resource-index selection"
  storage_and_databases:
    - "Operator-selected local filesystem data path"
    - "Hosted S3 data-lake and benchmark downloads"
    - "External biomedical databases and APIs used by individual tools"
    - "Hosted Hugging Face Biomni-Eval1 dataset"
  interfaces:
    - "A1 Python API"
    - "Streaming Python generator"
    - "Optional Gradio web interface"
    - "MCP stdio client and server"
    - "PDF conversation-history export"
  deployment:
    - "pip-installable Python package"
    - "Conda environment"
    - "Large optional E1 environment setup scripts for Ubuntu 22.04"
    - "Local Gradio process"
  observability_and_evaluation:
    - "Stepwise execution log and streamed messages"
    - "Conversation trace and plot export"
    - "BiomniEval1 task-specific scoring adapter"
    - "No repository CI workflow or dedicated automated test suite found at the analyzed snapshot"
  security_and_permissions:
    - "Generated code has local file, network, credential, and system-command access"
    - "External MCP servers run as configured subprocesses"
    - "Commercial mode filters cataloged resources by recorded licensing metadata"
    - "Optional Gradio access-code check with a hard-coded default code"
  data_flows:
    - "User task -> LLM resource selector -> selected tool, data, library, and know-how descriptions -> agent system prompt"
    - "Agent prompt and conversation -> model output -> execute-tag parser -> Python, R, Bash, or CLI runner -> observation -> next model turn"
    - "A1 initialization -> hosted S3 manifest/download helpers -> local biomni_data directories"
    - "MCP configuration -> stdio server discovery -> wrapped tool registry -> agent execution"
  control_flows:
    - "START -> generate -> execute -> generate until a solution ends the graph"
    - "Optional self-critic routes a completed answer back to generation for configured additional rounds"
    - "go and go_stream perform resource retrieval before streaming the compiled graph"

