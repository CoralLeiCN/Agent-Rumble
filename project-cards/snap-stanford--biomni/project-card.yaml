summary:
  one_line: >-
    A Python biomedical research agent that retrieves domain resources and lets
    an LLM iteratively run biomedical tools or generated Python, R, Bash, and CLI
    code.
  purpose: >-
    Biomni combines model-driven planning, resource selection, biomedical data
    and software catalogs, domain-specific tools, know-how retrieval, and local
    computation to support research questions across biomedical subfields.
  target_users:
    - "Biomedical and life-science researchers"
    - "Bioinformaticians and computational biologists"
    - "AI researchers evaluating tool-using scientific agents"
    - "Developers integrating biomedical tools, data, software, or MCP servers"
  primary_use_cases:
    - "Plan and execute multi-step biomedical research and analysis tasks"
    - "Query biomedical databases and scientific literature"
    - "Analyze biological datasets with Python, R, CLI, and domain-specific tools"
    - "Prototype custom biomedical tools, data sources, software, and MCP integrations"
    - "Evaluate answers against the separate Biomni-Eval1 benchmark dataset"

classification:
  secondary_characteristics:
    - "domain-specific scientific agent"
    - "retrieval-augmented tool and resource selection"
    - "code-executing ReAct-style workflow"
    - "extensible biomedical tool ecosystem"
    - "local Python package with optional web UI"
  domains:
    - "biomedicine"
    - "bioinformatics"
    - "computational biology"
    - "scientific literature and databases"
    - "experimental design"
  delivery_forms:
    - "Python package"
    - "Python API"
    - "optional Gradio web interface"
    - "MCP client and server integration"
  agent_patterns:
    - "generate-execute-observe loop"
    - "resource retrieval before reasoning"
    - "tool use"
    - "generated code execution"
    - "optional self-critique and test-time scaling"
    - "in-process conversational state"
  architecture_layers:
    - "Python and optional Gradio interfaces"
    - "LLM provider adapter"
    - "LangGraph agent orchestration"
    - "resource retriever and registries"
    - "biomedical tools, data lake, software, and know-how"
    - "local code and subprocess execution"
    - "MCP interoperability"
  claim_ids:
    - "claim-classification"
    - "claim-agent-loop"
    - "claim-resource-selection"
    - "claim-biomedical-tooling"

capabilities:
  - capability_id: "capability-biomedical-agent-tasks"
    ontology_id: "x-biomni:biomedical-agent-tasks"
    name: "Autonomous biomedical task execution"
    description: >-
      Accepts a natural-language biomedical task, selects relevant resources,
      iterates between model generation and execution, and returns a solution and
      execution trace.
    support_status: statically_confirmed
    scope: "The A1 agent's go, go_stream, and configured LangGraph workflow"
    interfaces:
      - "A1.go(prompt)"
      - "A1.go_stream(prompt)"
      - "A1.launch_gradio_demo()"
    prerequisites:
      - "A supported LLM provider or compatible local endpoint"
      - "Python 3.11 environment"
      - "Task-specific biomedical packages, tools, data, and service credentials"
    configuration_requirements:
      - "LLM model and provider configuration"
      - "BIOMNI_DATA_PATH or constructor path when not using ./data"
      - "BIOMNI_TIMEOUT_SECONDS when the 600-second default is unsuitable"
    limitations:
      - "Scientific correctness and benchmark performance were not runtime verified."
      - "A1 initialization downloads a large data lake and benchmark corpus unless explicitly skipped."
      - "Execution is not sandboxed."
    confidence: high
    claim_ids:
      - "claim-agent-loop"
      - "claim-resource-selection"
      - "claim-host-execution"
    evidence_refs:
      - "evidence-readme-purpose-and-usage"
      - "evidence-agent-workflow"
      - "evidence-resource-retrieval"

  - capability_id: "capability-biomedical-resources"
    ontology_id: "x-biomni:biomedical-resource-selection"
    name: "Biomedical tool, data, software, and know-how retrieval"
    description: >-
      Presents registered biomedical tools, data-lake items, software libraries,
      and know-how summaries to an LLM and injects selected resources into the
      agent context.
    support_status: statically_confirmed
    scope: "A1 resource preparation, ToolRetriever, ToolRegistry, and bundled catalogs"
    interfaces:
      - "Automatic retrieval during A1.go and A1.go_stream"
      - "Bundled tool-description modules"
      - "Bundled data, library, and know-how catalogs"
    prerequisites:
      - "Tool retrieval enabled"
      - "An LLM able to return resource indices in the expected format"
      - "Downloaded or operator-supplied data for data-dependent tools"
    configuration_requirements:
      - "BIOMNI_USE_TOOL_RETRIEVER"
      - "BIOMNI_COMMERCIAL_MODE for license-based catalog filtering"
    limitations:
      - "Selection is prompt-based and was not evaluated for recall, precision, or prompt-injection resistance."
      - "Many catalog entries depend on packages, datasets, CLIs, or services outside the repository boundary."
    confidence: high
    claim_ids:
      - "claim-resource-selection"
      - "claim-biomedical-tooling"
      - "claim-extensibility"
    evidence_refs:
      - "evidence-resource-retrieval"
      - "evidence-tool-catalog"
      - "evidence-custom-resources"

  - capability_id: "capability-local-computation"
    ontology_id: "x-biomni:local-generated-code-execution"
    name: "Generated Python, R, Bash, and CLI execution"
    description: >-
      Parses model output enclosed in execution tags and dispatches it to a
      persistent Python exec namespace or to R and shell subprocess helpers with
      a configurable timeout.
    support_status: statically_confirmed
    scope: "The A1 execute node and local execution helpers"
    interfaces:
      - "Model-generated <execute> blocks"
      - "Python persistent REPL"
      - "Rscript, Bash, and CLI subprocess execution"
    prerequisites:
      - "Local host permissions for the requested operation"
      - "Python and task-specific libraries"
      - "R or command-line software for corresponding execution modes"
    configuration_requirements:
      - "BIOMNI_TIMEOUT_SECONDS or timeout_seconds"
    limitations:
      - "No execution sandbox or least-privilege boundary is implemented."
      - "Generated code can access local files, credentials, network, and system commands."
      - "Timeouts limit duration but do not provide isolation."
    confidence: high
    claim_ids:
      - "claim-agent-loop"
      - "claim-host-execution"
      - "claim-production-risk"
    evidence_refs:
