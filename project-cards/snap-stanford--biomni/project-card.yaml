    name: "Biomni E1 environment"
    path: "biomni_env/"
    project_type: "supporting environment"
    purpose: "Defines Conda, Python, R, and CLI-tool installation paths for broad biomedical computation."
    claim_ids:
      - "claim-installation-surface"

usage:
  installation: >-
    The README directs users to prepare a Biomni Conda environment, activate
    biomni_e1, and install or upgrade the biomni pip package. A minimal Conda
    environment is available, while the full E1 setup is documented as taking
    more than ten hours and at least 30 GB; some functions require separate or
    manually adjusted environments because of dependency conflicts.
  minimal_start: >-
    Import A1 from biomni.agent, instantiate it with a data path and supported
    model, then call agent.go with a biomedical task. Pass
    expected_data_lake_files=[] to avoid the default large data-lake download
    during initialization.
  configuration:
    - "Model name and optional LLM_SOURCE"
    - "Provider API keys and endpoints"
    - "BIOMNI_DATA_PATH or BIOMNI_PATH"
    - "BIOMNI_TIMEOUT_SECONDS"
    - "BIOMNI_USE_TOOL_RETRIEVER"
    - "BIOMNI_COMMERCIAL_MODE"
    - "Provider-, database-, and tool-specific credentials"
  required_services:
    - "At least one supported hosted model service or a reachable local/custom endpoint"
    - "Hosted S3 data source for default data-lake and benchmark acquisition"
    - "Task-specific biomedical databases, APIs, datasets, packages, R libraries, and CLI tools"
  extension_points:
    - "A1.add_tool for Python callables"
    - "A1.add_data and A1.add_software for additional resource descriptions"
    - "KnowHowLoader custom documents and repository know-how files"
    - "Tool implementation and tool-description modules"
    - "MCP servers imported through YAML configuration"
    - "Biomni tools exposed through a generated MCP server"
    - "Additional benchmark classes and scoring adapters"

assessment:
  contexts:
    - context_id: "context-static-self-hosted-evaluation"
      use_case: >-
        Static technical due diligence for adopting or extending Biomni as a
        self-hosted biomedical research agent.
      comparison_cohort:
        - "Open-source domain-specific scientific agent applications"
        - "Tool-using biomedical research assistants"
      requirements:
        - "Evidence-backed biomedical agent and tool implementation"
        - "Configurable model and resource integrations"
        - "Reproducible installation and automated quality checks"
