project:
  project_id: "project-langchain-ai-langgraph"
  name: "LangGraph"
  primary_type: agent_framework_sdk
  type_rationale: >-
    LangGraph is primarily a reusable Python framework and SDK ecosystem for
    constructing and running stateful agent and workflow graphs. The analyzed
    repository provides graph and functional composition APIs, a Pregel-inspired
    execution runtime, checkpoint interfaces and database adapters, prebuilt
    agent/tool components, a CLI, and a client SDK; it is not itself a finished
    agent application.
  boundary: >-
    The open-source Python LangGraph project maintained in the single public
    langchain-ai/langgraph repository on main at commit
    49ae27c2ae983cfb92091b0dea9f7bc37a716479. Included are the langgraph core,
    prebuilt, checkpoint, checkpoint-sqlite, checkpoint-postgres,
    checkpoint-conformance, CLI, and Python SDK packages; repository-hosted
    READMEs, examples, representative tests, and GitHub Actions configuration are
    included as static evidence. Excluded are the separate LangGraph.js
    repository, external LangChain and LangSmith implementations, hosted
    LangSmith services and deployments, package-registry and release pages,
    third-party dependency source, issues and pull requests, notebook output and
    binary media, and all runtime behavior.
  repositories:
    - source_id: "source-langgraph-repository"
      url: "https://github.com/langchain-ai/langgraph"
      owner: "langchain-ai"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "libs/langgraph/"
        - "libs/prebuilt/"
        - "libs/checkpoint/"
        - "libs/checkpoint-sqlite/"
        - "libs/checkpoint-postgres/"
        - "libs/checkpoint-conformance/"
        - "libs/cli/"
        - "libs/sdk-py/"
        - "examples/"
        - ".github/workflows/"
      excluded_paths:
        - "The separate langchain-ai/langgraphjs repository"
        - "External LangChain, LangSmith, model-provider, and database implementations"
        - "Hosted LangSmith products, deployments, and documentation bodies"
        - "Issues, pull requests, discussions, package registries, and release assets"
        - "Notebook output, binary media, third-party dependency source, and runtime execution"
  packages:
    - "langgraph 1.2.9"
    - "langgraph-prebuilt 1.1.0"
    - "langgraph-checkpoint 4.1.1"
    - "langgraph-checkpoint-sqlite 3.1.0"
    - "langgraph-checkpoint-postgres 3.1.0"
    - "langgraph-checkpoint-conformance 0.0.2"
    - "langgraph-cli 0.4.31"
    - "langgraph-sdk 0.4.2"
  services:
    - "Optional local LangGraph API server launched through langgraph-cli[inmem]"
    - "Optional Docker-based LangGraph API stack assembled by the CLI"
  documentation_sites:
    - "Repository-hosted package READMEs"
    - "https://docs.langchain.com/oss/python/langgraph/overview (linked but not analyzed)"
    - "https://reference.langchain.com/python/langgraph (linked but not analyzed)"
  license: "MIT"
  status: active

