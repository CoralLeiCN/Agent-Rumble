capabilities:
  - capability_id: "capability-graph-composition"
    ontology_id: "x-langgraph:state-graph-composition"
    name: "Typed state-graph composition"
    description: >-
      Builds executable workflows from stateful nodes, reducers, directed edges,
      conditional routes, sequences, and subgraphs, then exposes synchronous and
      asynchronous invoke and stream interfaces.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "langgraph core StateGraph and compiled Pregel runtime"
    interfaces:
      - "Python StateGraph builder API"
      - "Compiled graph invoke, ainvoke, stream, and astream methods"
      - "LangChain Runnable interface"
    prerequisites:
      - "Python 3.10 or later"
      - "langgraph and its direct Python dependencies"
    configuration_requirements:
      - "A state schema and node callables"
      - "Edges, conditional routes, or entry and finish points"
    limitations:
      - "The framework supplies orchestration rather than a domain-specific finished agent."
      - "Graph and node behavior was not executed in this analysis."
    confidence: high
    claim_ids:
      - "claim-graph-composition"
      - "claim-parallel-control"
    evidence_refs:
      - "evidence-stategraph-contract"
      - "evidence-routing-primitives"
      - "evidence-dynamic-send"

  - capability_id: "capability-functional-workflows"
    ontology_id: "x-langgraph:functional-workflows"
    name: "Functional workflow and task API"
    description: >-
      Wraps synchronous or asynchronous Python functions as checkpointable
      entrypoints and tasks with futures, retries, caching, timeouts, context,
      and persistent previous results.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "langgraph.func task and entrypoint APIs"
    interfaces:
      - "Python decorators"
      - "invoke, ainvoke, stream, and astream workflow methods"
    prerequisites:
      - "Python 3.10 or later; Python 3.11 or later for asynchronous task functions"
    configuration_requirements:
      - "Optional checkpointer, store, cache, retry, and timeout policies"
    limitations:
      - "Checkpointed inputs and outputs must be serializable."
      - "Synchronous tasks cannot be safely cancelled in-process by timeout."
    confidence: high
    claim_ids:
      - "claim-functional-api"
    evidence_refs:
      - "evidence-functional-task"
      - "evidence-functional-entrypoint"

  - capability_id: "capability-durable-persistence"
    ontology_id: "x-langgraph:durable-persistence"
    name: "Checkpointed durable execution and memory"
    description: >-
      Persists graph state by thread and checkpoint, keeps pending writes, and
      supports pause, resume, replay, state history, and memory across invocations
      through an interface with in-memory, SQLite, and PostgreSQL implementations.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "compiled graphs and repository-maintained checkpoint packages"
    interfaces:
      - "BaseCheckpointSaver sync and async protocol"
      - "InMemorySaver"
      - "SqliteSaver and AsyncSqliteSaver"
      - "PostgresSaver and AsyncPostgresSaver"
      - "Compiled graph state and history APIs"
    prerequisites:
      - "A configured checkpointer"
      - "A thread_id for independent persisted execution state"
      - "SQLite or PostgreSQL and their adapter dependencies when selected"
    configuration_requirements:
      - "Checkpoint namespace and optional checkpoint ID"
      - "PostgreSQL setup and connection options when using PostgresSaver"
      - "A restricted serializer allowlist or strict MessagePack mode for untrusted checkpoint stores"
    limitations:
      - "Durability and recovery guarantees were not exercised."
      - "Persistence security depends on protecting the store and configuring deserialization safely."
    confidence: high
    claim_ids:
      - "claim-durable-persistence"
      - "claim-checkpoint-security"
    evidence_refs:
      - "evidence-compile-persistence"
      - "evidence-checkpoint-contract"
      - "evidence-checkpoint-adapters"
      - "evidence-checkpoint-security"

  - capability_id: "capability-human-interrupts"
    ontology_id: "x-langgraph:human-interrupts"
    name: "Resumable human-in-the-loop interrupts"
    description: >-
      Pauses execution from within a node, surfaces context to a client, and
      resumes with a Command value while preserving graph state in a checkpointer.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "compiled graph nodes and functional entrypoints"
    interfaces:
