architecture:
  overview: >-
    Applications define shared state and nodes through StateGraph or wrap
    functions through entrypoint and task. Compilation produces a Pregel-style
    runnable that schedules nodes, merges channel updates, retries work, handles
    commands and interrupts, writes checkpoints, and emits configurable streams.
    Prebuilt components add a model/tool loop. Persistence is abstracted behind
    checkpoint and store protocols with repository packages for memory, SQLite,
    and PostgreSQL. The optional CLI assembles local or Docker API environments,
    while the Python SDK talks to a separately running LangGraph API server.
  languages:
    - "Python"
    - "YAML for CI and deployment configuration"
    - "JSON for LangGraph application configuration"
  frameworks_and_sdks:
    - name: "langchain-core"
      version_constraint: ">=1.4.7,<2 for langgraph 1.2.9"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-dependencies"
    - name: "Pydantic"
      version_constraint: ">=2.7.4"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-dependencies"
  model_providers: []
  runtime_and_orchestration:
    - name: "LangGraph Pregel runtime"
      version_constraint: "langgraph 1.2.9"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-graph-composition"
        - "claim-streaming"
    - name: "xxhash"
      version_constraint: ">=3.5.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-dependencies"
  tools_and_mcp:
    tools:
      - name: "LangChain BaseTool-compatible tools"
        version_constraint: "through langchain-core>=1.3.1 for langgraph-prebuilt"
        dependency_relation: direct
        required: false
        claim_ids:
          - "claim-prebuilt-agent"
    mcp_role: none
    mcp_details: []
  skills: []
  memory_and_state:
    - name: "langgraph-checkpoint"
      version_constraint: ">=4.1.0,<5.0.0 for langgraph 1.2.9"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-durable-persistence"
    - name: "ormsgpack"
      version_constraint: ">=1.12.0 in langgraph-checkpoint 4.1.1"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-durable-persistence"
        - "claim-checkpoint-security"
  retrieval_and_knowledge: []
  document_processing: []
  execution_and_sandbox:
    - name: "Docker"
      version_constraint: "User-supplied installation"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-runtime-tooling"
  gateways_and_routing: []
  storage_and_databases:
    - name: "SQLite"
      version_constraint: "via langgraph-checkpoint-sqlite 3.1.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-durable-persistence"
    - name: "PostgreSQL"
      version_constraint: "via langgraph-checkpoint-postgres 3.1.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-durable-persistence"
  interfaces:
    - name: "Python graph and functional APIs"
      version_constraint: "langgraph 1.2.9"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-graph-composition"
        - "claim-functional-api"
    - name: "LangGraph command-line interface"
      version_constraint: "0.4.31"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-runtime-tooling"
    - name: "LangGraph Python API client"
      version_constraint: "0.4.2"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-runtime-tooling"
  deployment:
    - name: "LangGraph CLI local in-memory server extra"
      version_constraint: "langgraph-api>=0.5.35,<1.0.0 and langgraph-runtime-inmem>=0.7"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-runtime-tooling"
    - name: "Docker image and Dockerfile generation"
      version_constraint: "CLI 0.4.31"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-runtime-tooling"
  observability_and_evaluation:
    - name: "LangSmith tracing integration"
      version_constraint: "External optional service through LangChain interfaces"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-observability-boundary"
  security_and_permissions:
    - name: "Strict MessagePack deserialization allowlist"
      version_constraint: "LANGGRAPH_STRICT_MSGPACK or allowed_msgpack_modules"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-checkpoint-security"
  data_flows:
    - "Input and run context enter a compiled graph; scheduled nodes read state and emit partial updates."
    - "Channel reducers merge node updates into state and route work to sequential, conditional, parallel, or nested destinations."
    - "A configured checkpointer serializes thread-scoped state, metadata, and pending writes; subsequent runs can resume or replay it."
    - "Stream modes project execution events, values, updates, messages, checkpoints, task events, and debug information to callers."
    - "In a prebuilt agent, the model emits tool calls, ToolNode executes them, and ToolMessages return to the model loop."
    - "The Python SDK exchanges assistant, thread, run, state, and stream data with an external LangGraph API server."
  control_flows:
    - "Static and conditional graph edges determine the next node or nodes."
    - "Send dynamically fans out a node across custom states for map-reduce-style work."
    - "Command can update state, route to nodes or a parent graph, and resume interrupts."
    - "A checkpointer and thread ID allow interrupted or failed execution to continue from persisted state."
    - "Retry and timeout policies govern node, task, and workflow attempts."

