usage:
  installation: >-
    Install the core with `pip install -U langgraph` or `uv add langgraph`.
    Add packages such as langgraph-checkpoint-sqlite,
    langgraph-checkpoint-postgres, langgraph-cli, or langgraph-sdk when those
    persistence or runtime interfaces are needed.
  minimal_start: >-
    Define a typed state, create a StateGraph, add node callables and edges,
    compile it, and call invoke or stream. Alternatively, decorate functions
    with task and entrypoint for the functional API.
  configuration:
    - "State, input, output, and optional runtime-context schemas"
    - "Node callables, reducers, edges, conditional paths, retries, caching, and timeouts"
    - "Optional checkpointer, store, thread_id, and serializer restrictions"
    - "Optional model, prompt, tools, hooks, and state schema for prebuilt agents"
    - "langgraph.json graphs, dependencies, environment, and Python version for CLI-managed applications"
    - "LangGraph API server URL and authentication for the Python SDK"
  required_services: []
  extension_points:
    - "Custom graph nodes, state schemas, reducers, routes, Send values, commands, and subgraphs"
    - "Custom task and entrypoint functions"
    - "Custom checkpoint savers, stores, caches, serializers, and stream transformers"
    - "Custom models, prompts, tools, tool-call interceptors, and agent hooks"
    - "Custom CLI project templates, dependencies, Dockerfile lines, and additional Compose services"

