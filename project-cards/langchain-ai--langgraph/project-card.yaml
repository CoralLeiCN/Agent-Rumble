        Evaluate a Python framework for custom, stateful agents and workflows
        that need explicit control flow, durable state, streaming, and human
        review, using only repository-hosted static evidence.
      comparison_cohort:
        - "Python agent orchestration frameworks"
        - "durable workflow runtimes used for agent applications"
        - "graph-based agent SDKs"
      requirements:
        - "Composable deterministic and agentic control flow"
        - "Checkpointed pause, resume, replay, and state inspection"
        - "Human-in-the-loop interruption"
