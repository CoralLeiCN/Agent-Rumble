      - "Command(resume=...)"
      - "interrupt_before and interrupt_after graph options"
    prerequisites:
      - "A checkpointer"
      - "A stable thread_id"
    configuration_requirements:
      - "Client-side handling of surfaced interrupt values and resume commands"
    limitations:
      - "Resuming restarts the interrupted node, so side effects before interrupt must be designed for replay."
      - "Interactive behavior was not runtime verified."
    confidence: high
    claim_ids:
      - "claim-human-interrupts"
    evidence_refs:
