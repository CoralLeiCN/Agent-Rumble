      - "Agent or handoff descriptions for model-directed delegation"
    limitations:
      - "Hosted tools are specific to compatible OpenAI Responses models."
      - "Local computer, shell, and patch tools execute through application-supplied or configured environments and require separate permission controls."
      - "Agent-as-tool and handoff behavior are distinct and must be selected deliberately."
    confidence: high
    claim_ids:
