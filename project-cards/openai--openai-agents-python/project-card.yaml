architecture:
  overview: >-
    Application code creates Agent objects and invokes Runner. The runner selects
    a model through ModelProvider, prepares instructions, history, tools and MCP
    tools, calls the model, executes or pauses eligible tools, applies guardrails
    and handoffs, persists session items, emits trace spans, and repeats until a
    final output or terminal condition. RealtimeRunner maintains a persistent
    realtime connection, while SandboxAgent adds manifest and capability
    preparation around the same core agent model.
  languages:
    - "Python"
  frameworks_and_sdks:
    - name: "OpenAI Python library"
      version_constraint: ">=2.45.0,<3"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-model-providers"
    - name: "Pydantic"
      version_constraint: ">=2.12.2,<3"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-classification"
    - name: "GriffeLib"
      version_constraint: ">=2,<3"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-tool-and-multi-agent-surface"
    - name: "Requests"
      version_constraint: ">=2.0,<3"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-classification"
    - name: "WebSockets"
      version_constraint: ">=15.0,<17"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-realtime"
  model_providers:
    - name: "OpenAI Responses API"
      version_constraint: null
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-providers"
    - name: "OpenAI Chat Completions API"
      version_constraint: null
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-providers"
    - name: "LiteLLM"
      version_constraint: ">=1.83.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-model-providers"
    - name: "AnyLLM SDK"
      version_constraint: ">=1.11.0,<2; Python >=3.11"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-model-providers"
