    name: "Guardrails and resumable approvals"
    description: >-
      Runs input, output, and function-tool guardrails and can pause runs for
      tool approval, serialize RunState, record a decision, and resume the
      original workflow.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "Runner, agent guardrails, function-tool guardrails, approval-capable tools, and RunState"
    interfaces:
      - "input_guardrail and output_guardrail decorators"
      - "Function-tool input and output guardrails"
      - "RunResult.interruptions and RunState approve/reject APIs"
    prerequisites:
