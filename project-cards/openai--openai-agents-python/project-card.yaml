summary:
  one_line: >-
    A Python SDK for building and running tool-using, multi-agent, realtime, and
    sandbox-backed workflows with guardrails, approvals, sessions, and tracing.
  purpose: >-
    The SDK gives application developers composable Agent and Runner primitives,
    model adapters, tools, handoffs, MCP clients, state management, safety hooks,
    and observability so they can implement agent workflows without writing the
    complete model-and-tool loop themselves.
  target_users:
    - "Python developers building agent applications"
    - "Teams integrating OpenAI Responses or Chat Completions models"
    - "Developers using other model providers through optional adapters"
    - "Platform teams requiring reusable orchestration, approval, state, and tracing primitives"
    - "Developers building realtime voice or workspace-oriented sandbox agents"
  primary_use_cases:
    - "Define agents with instructions, tools, structured outputs, guardrails, and hooks"
    - "Build manager-style or handoff-based multi-agent workflows"
    - "Run synchronous, asynchronous, or streaming agent loops"
    - "Connect hosted and locally managed MCP servers"
    - "Persist conversation state and resume approval-interrupted runs"
    - "Trace agent, model, tool, handoff, guardrail, and audio activity"
    - "Build realtime voice agents and sandbox-backed long-horizon agents"

