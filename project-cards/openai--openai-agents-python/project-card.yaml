project:
  project_id: "project-openai-openai-agents-python"
  name: "OpenAI Agents SDK for Python"
  primary_type: agent_framework_sdk
  type_rationale: >-
    The project is primarily a reusable Python framework and SDK for defining
    agents and orchestrating model turns, tools, handoffs, guardrails, sessions,
    approvals, tracing, realtime agents, and sandbox-backed agents. The
    repository contains examples but not a single end-user agent application.
  boundary: >-
    The OpenAI Agents SDK for Python implemented in the single public
    openai/openai-agents-python repository at commit
    65886fa16dcdb482090b30b74de1d0cc80b9f4c6. Included are the openai-agents
    Python package under src/agents, repository-hosted documentation,
    representative examples and tests, package metadata, license, security
    policy, and GitHub Actions configuration. Excluded are the separate
    JavaScript/TypeScript SDK, OpenAI platform and hosted-tool implementations,
    external model and MCP server implementations, optional sandbox-provider
    services, package-registry metadata beyond the checked-out manifest,
    issues and pull requests, and all runtime behavior.
  repositories:
    - source_id: "source-openai-agents-repository"
      url: "https://github.com/openai/openai-agents-python"
      owner: "openai"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "SECURITY.md"
        - "pyproject.toml"
        - "src/agents/"
        - "docs/"
        - "examples/"
        - "tests/"
        - ".github/workflows/"
      excluded_paths:
        - "Separate openai/openai-agents-js repository"
        - "OpenAI platform, hosted tools, and model-service implementations"
        - "External model, MCP server, database, and sandbox-provider implementations"
        - "Issues, pull requests, package-registry history, and release artifacts"
        - "Runtime execution, dependency installation, and dynamic security testing"
  packages:
    - "openai-agents 0.18.3 Python package"
  services: []
  documentation_sites:
    - "Repository-hosted documentation under docs/"
    - "https://openai.github.io/openai-agents-python/ (generated from the repository; not separately analyzed)"
  license: "MIT"
  status: active

