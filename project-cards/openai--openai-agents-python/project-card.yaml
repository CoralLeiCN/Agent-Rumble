      - "evidence-runner-loop"

  - capability_id: "capability-tools-and-delegation"
    ontology_id: "x-openai-agents:tools-and-delegation"
    name: "Tools and multi-agent delegation"
    description: >-
      Exposes Python functions, agents, hosted OpenAI tools, local execution
      harnesses, and MCP tools to models, while supporting manager-style agents
      as tools and conversation handoffs to specialists.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "Agent tools, Agent.as_tool, handoffs, and Runner tool execution"
    interfaces:
      - "function_tool decorator"
      - "Agent.as_tool"
