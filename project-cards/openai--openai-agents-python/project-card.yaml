capabilities:
  - capability_id: "capability-agent-orchestration"
    ontology_id: "x-openai-agents:agent-orchestration"
    name: "Agent definition and orchestration"
    description: >-
      Defines typed agents and runs a turn loop that handles final outputs,
      model calls, tools, handoffs, guardrails, context, hooks, and turn limits.
    support_status: statically_confirmed
    evidence_status: confirmed
    scope: "Agent, Runner, AgentRunner, RunConfig, and run-internal orchestration"
    interfaces:
      - "Runner.run"
      - "Runner.run_sync"
      - "Runner.run_streamed"
      - "Agent and RunConfig Python APIs"
    prerequisites:
      - "Python 3.10 or newer"
      - "A configured supported model endpoint"
    configuration_requirements:
      - "Agent name and optional instructions, model, tools, handoffs, output type, and guardrails"
      - "Provider credentials or endpoint configuration"
    limitations:
      - "Workflow correctness, termination, latency, and model behavior depend on application configuration and the selected model."
      - "The default runner is a model-and-tool loop, not a durable distributed workflow engine."
      - "No workflow was executed during this analysis."
    confidence: high
    claim_ids:
      - "claim-runner-orchestration"
      - "claim-tool-and-multi-agent-surface"
    evidence_refs:
