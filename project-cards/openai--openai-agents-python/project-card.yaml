      - "needs_approval or require_approval policy for sensitive tools"
    limitations:
      - "Parallel input guardrails may finish after model tokens or tool side effects have begun."
      - "Tool guardrails do not cover handoffs, hosted tools, built-in execution tools, or Agent.as_tool in the same way as function tools."
