summary:
  one_line: >-
    A typed Python SDK that embeds Claude Code's agent loop through one-shot or
    interactive clients, with tools, MCP, hooks, subagents, skills, permissions,
    structured output, and session management.
  purpose: >-
    The SDK lets Python applications drive Claude Code programmatically while
    configuring its working directory, tools, permissions, agent definitions,
    extension points, execution safeguards, and persisted conversation state.
  target_users:
    - "Python developers embedding a coding or general-purpose agent in applications"
    - "Teams building interactive agent services or automation around Claude Code"
    - "Platform engineers integrating custom tools, MCP servers, hooks, and session storage"
  primary_use_cases:
    - "Run one-shot asynchronous agent queries"
    - "Build bidirectional multi-turn and streaming agent experiences"
    - "Expose Python functions as in-process MCP tools"
    - "Define subagents, skills, plugins, hooks, and permission decisions"
    - "Resume, fork, inspect, and externally mirror session transcripts"
    - "Constrain turns, spend, tools, filesystem access, and command execution"

classification:
  secondary_characteristics:
    - "Claude Code embedding SDK"
    - "typed asynchronous Python client"
    - "agent extension and control layer"
    - "MCP client and in-process MCP tool host"
    - "CLI-backed agent runtime adapter"
  domains:
    - "software development"
    - "general-purpose task automation"
    - "agent application development"
  delivery_forms:
    - "Python package"
    - "bundled platform-specific CLI executable in built wheels"
  agent_patterns:
    - "model-directed tool use"
    - "single-agent conversation loop"
    - "programmatic subagent delegation"
    - "human or callback permission decisions"
    - "event hooks"
    - "session resume and fork"
  architecture_layers:
    - "public Python API and typed messages"
    - "SDK control protocol"
    - "subprocess transport"
    - "Claude Code CLI agent runtime"
    - "MCP servers and tools"
    - "local and external session stores"
  claim_ids:
    - "claim-classification"
    - "claim-cli-runtime"
    - "claim-interactive-client"

