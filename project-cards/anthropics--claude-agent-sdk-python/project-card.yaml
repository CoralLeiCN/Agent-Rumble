project:
  project_id: "project-anthropics-claude-agent-sdk-python"
  name: "Claude Agent SDK for Python"
  primary_type: agent_framework_sdk
  type_rationale: >-
    The project is a typed Python SDK for embedding Claude Code's agent loop in
    applications. It exposes one-shot and bidirectional clients, tool and MCP
    integration, hooks, subagents, skills, session controls, permission policy,
    and structured output, while delegating the actual agent runtime to a
    bundled or user-supplied Claude Code CLI.
  boundary: >-
    The Claude Agent SDK for Python package, public Python source, examples,
    tests, build metadata, and repository-hosted documentation in the single
    anthropics/claude-agent-sdk-python repository at tag v0.2.122 and commit
    94ff18e08551e1b96ba2668d90eacfedd92a3a55. Included are the public API,
    subprocess transport and control protocol, in-process SDK MCP bridge,
    session-store interfaces, representative tests, and CI definitions.
    Excluded are the bundled binary's source and runtime behavior, the Claude
    Code repository and service implementation, Anthropic model and API
    internals, externally linked documentation, third-party dependency source,
    issues and pull requests, package artifacts, and all dynamic execution.
  repositories:
    - source_id: "source-claude-sdk-repository"
      url: "https://github.com/anthropics/claude-agent-sdk-python"
      owner: "anthropics"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "CHANGELOG.md"
        - "pyproject.toml"
        - "src/claude_agent_sdk/"
        - "examples/"
        - "tests/"
        - "e2e-tests/"
        - ".github/workflows/"
      excluded_paths:
        - "Bundled Claude Code executable content under src/claude_agent_sdk/_bundled/"
        - "External documentation and service implementations"
        - "Third-party dependency source, issues, pull requests, and release artifacts"
        - "Runtime execution, dependency installation, and dynamic security testing"
  packages:
    - "claude-agent-sdk 0.2.122 Python package"
  services:
    - "Claude Code CLI subprocess invoked by the SDK"
    - "Anthropic-hosted Claude API reached through Claude Code"
  documentation_sites:
    - "Repository README and examples"
    - "https://platform.claude.com/docs/en/agent-sdk/python (linked but not analyzed)"
  license: >-
    MIT for repository source; the README additionally states that use of the
    SDK is governed by Anthropic's Commercial Terms of Service except for
    components covered by their own licenses.
  status: active

