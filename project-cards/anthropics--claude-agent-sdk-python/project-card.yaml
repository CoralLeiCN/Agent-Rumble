architecture:
  overview: >-
    Python callers use query() or ClaudeSDKClient. The SDK converts options into
    Claude Code CLI flags and initialization/control messages, spawns the bundled
    or configured CLI through an AnyIO subprocess transport, parses streamed
    JSON messages into typed Python objects, and bridges callbacks, in-process
    MCP tools, and optional session-store transcript mirroring in the parent process.
  languages:
    - "Python 3.10+"
  frameworks_and_sdks:
    - name: "AnyIO"
      version_constraint: ">=4.0.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-metadata"
    - name: "MCP Python SDK"
      version_constraint: ">=1.23.0,<2.0.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-package-metadata"
        - "claim-mcp"
  model_providers:
    - name: "Anthropic Claude through Claude Code"
      version_constraint: "CLI-selected Claude model"
      dependency_relation: hosted
      required: true
      claim_ids:
        - "claim-cli-runtime"
  runtime_and_orchestration:
    - name: "Claude Code CLI"
      version_constraint: "Bundled version tracked separately by package release tooling"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-cli-runtime"
    - name: "AnyIO task groups and subprocess streams"
      version_constraint: ">=4.0.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-interactive-client"
  tools_and_mcp:
    tools:
      - name: "Claude Code built-in tools"
        version_constraint: "Provided by selected Claude Code CLI"
        dependency_relation: bundled
        required: false
        claim_ids:
          - "claim-tool-permissions"
      - name: "SDK MCP tool bridge"
        version_constraint: "claude-agent-sdk 0.2.122"
        dependency_relation: direct
        required: false
        claim_ids:
          - "claim-mcp"
    mcp_role: both
    mcp_details:
      - "The SDK configures external MCP servers as a client."
      - "Python functions can be exposed as tools through in-process SDK MCP servers."
  skills:
    - name: "Claude Code skills"
      version_constraint: "Discovered by Claude Code from configured setting sources and plugins"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-agent-extensions"
  memory_and_state:
    - name: "Claude Code local JSONL session transcripts"
      version_constraint: "Selected Claude Code CLI format"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-sessions"
    - name: "Pluggable SessionStore"
      version_constraint: "claude-agent-sdk 0.2.122 protocol"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-sessions"
  retrieval_and_knowledge: []
  document_processing: []
  execution_and_sandbox:
    - name: "Claude Code command sandbox"
      version_constraint: "macOS/Linux support exposed by ClaudeAgentOptions"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-execution-controls"
    - name: "File checkpointing"
      version_constraint: "ClaudeAgentOptions.enable_file_checkpointing"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-execution-controls"
  gateways_and_routing: []
  storage_and_databases:
    - name: "Host-provided SessionStore backend"
      version_constraint: "Async append/load protocol; optional list/delete/subkey methods"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-sessions"
  interfaces:
    - name: "Python async API"
      version_constraint: "claude-agent-sdk 0.2.122"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-query-api"
        - "claim-interactive-client"
    - name: "Stream JSON subprocess protocol"
      version_constraint: "Claude Code CLI control protocol"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-cli-runtime"
  deployment:
    - name: "Platform-specific Python wheels with bundled Claude Code CLI"
      version_constraint: "Package 0.2.122"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-package-metadata"
        - "claim-cli-runtime"
  observability_and_evaluation:
    - name: "stderr callback and typed stream events"
      version_constraint: "claude-agent-sdk 0.2.122"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-interactive-client"
  security_and_permissions:
    - name: "Claude Code permission modes and tool rules"
      version_constraint: "Selected Claude Code CLI"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-tool-permissions"
    - name: "Application can_use_tool callback and PreToolUse hooks"
      version_constraint: "claude-agent-sdk 0.2.122"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-tool-permissions"
        - "claim-hooks"
  data_flows:
    - "A Python caller submits text or an async message stream to query() or ClaudeSDKClient."
    - "The SDK serializes options into CLI arguments and an initialization control message."
    - "Claude Code streams JSON messages; the SDK parses them into typed Python messages."
    - "Permission, hook, and SDK MCP requests cross the control channel to application callbacks."
    - "Optional transcript-mirror frames are batched to a host SessionStore while local CLI persistence remains active."
  control_flows:
    - "query() constructs an internal client for a bounded unidirectional exchange."
    - "ClaudeSDKClient maintains a bidirectional transport and accepts interrupts and runtime control requests."
    - "The CLI drives the agent loop and requests tool or hook decisions through the SDK control protocol."
    - "The host can stop tasks, change permission mode or model, manage MCP servers, and rewind checkpointed files."

