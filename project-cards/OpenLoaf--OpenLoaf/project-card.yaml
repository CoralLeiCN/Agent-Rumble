    statement: "The shell tool executes the user's real shell and its no-approval allowlist includes network clients, interpreters, package managers, version control, and file-copy utilities."
    claim_kind: assessment
    verification_status: statically_confirmed
    confidence: high
    applies_to: "Server shell approval and execution code at the analyzed commit"
    assessment_context_id: "context-local-desktop-agent-evaluation"
    supporting_evidence_ids:
