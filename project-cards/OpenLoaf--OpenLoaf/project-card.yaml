usage:
  installation: >-
    Download a platform release or, for source development, install Node.js 20
    or later and pnpm 10 or later, run `pnpm install`, initialize the database
    with `pnpm run db:migrate`, and start web plus server with `pnpm run dev`.
    The repository also exposes `pnpm run desktop` for the desktop development
    flow. These commands were documented but not executed.
  minimal_start: >-
    Start the local server and web interface, open localhost:3001 or the Electron
    desktop application, create or open a project, configure a model provider,
    and begin a project chat. Additional model, MCP, email, calendar, and cloud
    features require their own credentials or service configuration.
  configuration:
    - "Application and data directories, with optional database URL override"
    - "Project IDs, root URIs, hierarchy, and optional links"
    - "Model source, provider profiles, model IDs, API URLs, keys, or OpenLoaf cloud account"
    - "Global and project MCP server files plus explicit project trust"
    - "Global, ancestor-project, project, and built-in skills"
    - "User, project, ancestor-project, and specialist-agent memory files"
    - "Optional email, calendar, messaging, cloud-tool, browser, and platform helper settings"
  required_services: []
  extension_points:
    - "SKILL.md workflows and optional skill metadata"
    - "Filesystem-defined AGENT.md specialist agents"
    - "MCP servers and their dynamically registered tools"
    - "Provider profiles, custom OpenAI-compatible endpoints, and CLI adapters"
    - "Static and deferred tool registry entries"
    - "Widgets, project metadata, and shared workspace packages"

assessment:
  contexts:
    - context_id: "context-local-desktop-agent-evaluation"
      use_case: >-
        Evaluate a local-first desktop agent application for project-oriented
        knowledge work, multi-agent delegation, and extensible tools using only
        repository-hosted static evidence.
      comparison_cohort:
        - "desktop AI productivity applications"
        - "local-first agent workspaces"
        - "multi-tool personal agent applications"
      requirements:
        - "Project-specific workspaces and context"
        - "Agent delegation and reusable skills"
        - "Local state with explicit external integration boundaries"
        - "Multiple model providers and MCP extensibility"
        - "Cross-platform desktop delivery"
        - "Understandable permission and side-effect controls"
      organizational_constraints:
        - "Static analysis only; no project execution or dependency installation"
        - "Hosted OpenLoaf services and external providers are outside the source boundary"
        - "The adopting user remains responsible for provider, MCP, tool, and shell permissions"
        - "The analyzed tag is a beta server tag and the README cautions against production reliance"
      assessed_at: "2026-07-18T13:20:20Z"
  maturity: early
  maturity_signals:
    - statement: "The repository has versioned desktop, web, and server packages, broad test scripts, CodeQL, and multi-platform release workflows."
      reasoning: >-
        These artifacts indicate an actively engineered distributable product,
        but this analysis inspected definitions only and did not verify any test,
        workflow, signing, or release outcome.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-maturity"
    - statement: "The exact snapshot is a beta-tagged 0.2.9 line and the README explicitly warns that features and APIs may change."
      reasoning: >-
        The release identifier and maintainer caution support an early maturity
        assessment despite the repository's substantial implementation breadth.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-maturity"
  strengths:
    - statement: "It integrates project workspaces, agents, memory, skills, MCP, and productivity surfaces in one application boundary."
      reasoning: >-
        The repository contains dedicated desktop, web, server, agent, tool,
        context, and persistence components rather than delegating the entire
        experience to an external agent CLI.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-classification"
        - "claim-project-workspaces"
        - "claim-multi-agent"
        - "claim-memory"
        - "claim-skills"
        - "claim-mcp"
    - statement: "Its extension model spans model providers, MCP servers, filesystem skills, specialist agents, and a broad tool catalog."
      reasoning: >-
        Provider adapters, dynamic MCP tool registration, SKILL.md discovery,
        AGENT.md lookup, and ToolSearch activation are present in inspected code.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-model-routing"
        - "claim-mcp"
        - "claim-skills"
        - "claim-tools"
  limitations:
    - statement: "The local-first positioning does not make the complete agent workflow local when external services are selected."
      reasoning: >-
        Core paths and SQLite are local, but provider adapters, remote MCP,
        OpenLoaf SaaS, cloud tools, email, calendar, messaging, and update paths
        intentionally communicate with external systems.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-local-external-boundary"
    - statement: "Linked-project memory and skill injection is uncertain at the analyzed depth."
      reasoning: >-
        The README and Prisma schema represent links, but the inspected context
        loaders consume project ancestor roots and no ProjectLink-consuming
        runtime path was found in the targeted search.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: medium
      claim_ids:
        - "claim-project-linking"
  risks:
    - statement: "Agent shell execution has host-level side-effect risk beyond a narrow sandbox model."
      reasoning: >-
        The tool launches the user's shell in a resolved working directory. Its
        no-approval allowlist includes interpreters, package managers, network
        clients, version control, and file-copy commands, so approval filtering
        is not equivalent to OS isolation.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-shell-risk"
    - statement: "External models, MCP servers, and cloud tools can receive sensitive project context or cause external side effects."
      reasoning: >-
        Those integrations are deliberate extension points whose runtime trust,
        retention, authorization, and safety are outside the repository-only
        evidence boundary.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-local-external-boundary"
        - "claim-mcp"
        - "claim-tools"
  best_fit:
    - statement: "Technical users who want a project-oriented desktop agent workspace and can manage model, MCP, and tool permissions."
      reasoning: >-
        The application exposes a broad local workspace and extensibility model,
        while its beta status and powerful host tools reward users able to
        evaluate configuration and side effects carefully.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-project-workspaces"
        - "claim-multi-agent"
        - "claim-mcp"
        - "claim-shell-risk"
  poor_fit:
    - statement: "Organizations requiring a runtime-verified air-gapped deployment or mature enterprise control plane from repository evidence alone."
      reasoning: >-
        No runtime verification was performed, several optional capabilities use
        hosted or third-party services, and the analyzed release is explicitly
        beta and under active development.
      context_id: "context-local-desktop-agent-evaluation"
      confidence: high
      claim_ids:
        - "claim-local-external-boundary"
        - "claim-maturity"
  gaps: []

