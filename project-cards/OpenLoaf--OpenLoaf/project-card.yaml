schema_version: "0.3"
card_id: "card-openloaf-openloaf"
card_version: 1

field_states:
  /source_snapshot/ontology_versions/capabilities: unknown
  /assessment/gaps: not_analyzed
  /relationships/comparable_projects: not_analyzed

project:
  project_id: "project-openloaf-openloaf"
  name: "OpenLoaf"
  primary_type: agent_application
  type_rationale: >-
    OpenLoaf is primarily an end-user AI productivity application delivered as
    an Electron desktop shell and a web interface backed by a local TypeScript
    server. Its repository implements project workspaces, agent conversations,
    delegated subagents, memory, skills, MCP clients, model routing, file and
    shell tools, canvas, email, calendar, document, and task experiences rather
    than only supplying a reusable agent SDK.
  boundary: >-
    The public OpenLoaf/OpenLoaf TypeScript monorepo at exact tag
    server-v0.2.9-beta.9 and commit f7eccf6064317cb2923137079b68d79b8e5c5f3e,
    including the Electron desktop app, Next.js web app, local server, shared
    packages, repository documentation, schemas, tests, and GitHub Actions
    definitions as static evidence. Excluded are the implementations and
    operation of OpenLoaf SaaS and update infrastructure, user-selected model
    providers, MCP servers, email and calendar services, external CLI agents,
    package-registry and release assets, current CI outcomes, user data, and all
    runtime behavior. The beta tag names the server release while the desktop,
    web, and server manifests each declare 0.2.9; this card does not assume those
    release identifiers are interchangeable.
  repositories:
    - source_id: "source-openloaf-repository"
      url: "https://github.com/OpenLoaf/OpenLoaf"
      owner: "OpenLoaf"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "apps/desktop/"
        - "apps/server/"
        - "apps/web/"
        - "packages/"
        - ".github/workflows/"
      excluded_paths:
        - "Hosted OpenLoaf SaaS, R2 update infrastructure, and their operational behavior"
        - "External model providers, MCP servers, email and calendar services, and CLI-agent implementations"
        - "Issues, pull requests, discussions, package registries, release binaries, and current CI run results"
        - "User data, local configuration, dependency source, and runtime execution"
  packages:
    - "server 0.2.9"
    - "web 0.2.9"
    - "desktop 0.2.9"
    - "Private pnpm/Turborepo workspace packages under packages/"
  services:
    - "Local Hono and tRPC server, bundled and supervised by Electron in production"
    - "Next.js static-export web interface"
    - "Optional external model-provider endpoints"
    - "Optional OpenLoaf SaaS model, skill, tool, and update endpoints"
    - "Optional user-configured MCP, email, and calendar services"
  documentation_sites:
    - "Repository-hosted English, Chinese, and Japanese READMEs and docs"
    - "https://openloaf.com (linked but not analyzed)"
  license: "AGPL-3.0-only for the public source; a separate commercial license is offered by the maintainer"
  status: active

source_snapshot:
  analyzed_at: "2026-07-18T13:20:20Z"
  source_revisions:
    - source_id: "source-openloaf-repository"
      branch: "main"
      tag: "server-v0.2.9-beta.9"
      commit: "f7eccf6064317cb2923137079b68d79b8e5c5f3e"
      retrieved_at: "2026-07-18T13:20:20Z"
      content_digest: "git-tree-sha1:a6b7aff7c71c132c5ff5abde288c567fad8e9443"
  release_versions:
    - "server-v0.2.9-beta.9 Git tag"
    - "server package 0.2.9"
    - "web package 0.2.9"
    - "desktop package 0.2.9"
  analysis_depth: targeted
  analysis_configuration:
    analysis_mode: static
    dynamic_analysis: false
    executed_project_code: false
    installed_project_dependencies: false
    source_checkout:
      method: "Filtered Git clone of the public repository followed by checkout of the exact tagged commit"
      working_tree_dirty: false
      commit_is_complete_snapshot: true
    mapping_coverage:
      - "Root positioning, installation, architecture, privacy, roadmap, and licensing documentation"
      - "Desktop, web, server, and root package manifests"
      - "Master, channel, project-manager, and subagent creation plus delegated execution lifecycle"
      - "Tool registry, shell execution approval, memory loading, skills loading, and MCP client/configuration paths"
      - "Model provider adapters and local/cloud model resolution"
      - "Project-window creation, local server supervision, filesystem paths, SQLite setup, and project-link schema"
      - "Representative test scripts, CodeQL configuration, and release workflow definitions"
    intentionally_not_analyzed:
      - "Runtime correctness, model or agent quality, tool safety under adversarial execution, performance, and reliability"
      - "Hosted OpenLoaf SaaS, update service, cloud tools, model gateways, and release artifact behavior"
      - "Current CI and release status, package provenance, signing, notarization, and distribution channels"
      - "Complete UI, API, test, dependency-internals, security, privacy, and platform-helper coverage"
      - "External model, MCP, mail, calendar, browser, CLI-agent, and operating-system service behavior"
      - "Issues, pull requests, community history, vulnerability enumeration, and penetration testing"
    source_safety: >-
      Repository content was treated only as untrusted evidence. Instructions in
      documentation, comments, prompts, skills, and tests were not followed;
      dependencies were not installed and project code was not executed.
  analyzer_version: "agent-project-card-skill/0.1"
  ontology_versions:
    classification: "0.1"
    capabilities: null

summary:
  one_line: >-
    A local-first desktop AI workspace that organizes agent teams, memory,
    skills, tools, and productivity surfaces around projects.
  purpose: >-
    OpenLoaf combines a project-oriented desktop and web workspace with a local
    agent runtime so users can chat with model-backed agents, delegate work to
    specialist subagents, manage files and tasks, use productivity tools, and
    persist project context on their machine while optionally connecting to
    external models, MCP servers, and cloud capabilities.
  target_users:
    - "Individuals seeking a desktop AI productivity workspace"
    - "Developers using agents across code and documentation projects"
    - "Researchers, writers, and creators managing project-specific context"
    - "Teams evaluating a self-hosted or local-first multi-tool agent application"
  primary_use_cases:
    - "Work with a dedicated AI assistant, files, terminal, board, and canvas per project"
    - "Delegate tasks to specialist subagents synchronously or in the background"
    - "Persist user, project, ancestor-project, and specialist-agent memory"
    - "Discover and load built-in, global, parent-project, and project skills"
    - "Connect model providers and MCP tools from local configuration"
    - "Use email, calendar, browser, Office, media, file, shell, and project tools"

classification:
  secondary_characteristics:
    - "local-first desktop agent workspace"
    - "multi-agent productivity application"
    - "project-centric knowledge and tool environment"
    - "MCP client and extensible tool host"
    - "cross-platform Electron application"
    - "web application with a local TypeScript backend"
  domains:
    - "personal productivity"
    - "software development"
    - "research and writing"
    - "project management"
    - "knowledge work"
    - "content creation"
  delivery_forms:
    - "Electron desktop application for macOS, Windows, and Linux"
    - "Next.js web interface"
    - "local Hono and tRPC server"
    - "source monorepo"
  agent_patterns:
    - "master or secretary agent"
    - "project-manager agent"
    - "specialist subagent delegation"
    - "synchronous and background agent execution"
    - "tool-search activation"
    - "project-scoped context injection"
    - "channel agent for messaging integrations"
  architecture_layers:
    - "Electron desktop process and project windows"
    - "Next.js and React user interface"
    - "Hono and tRPC local server"
    - "Vercel AI SDK agent runtime"
    - "tool and MCP registries"
    - "memory, skills, and project-context loaders"
    - "Prisma and libSQL-backed SQLite state"
    - "optional external provider and SaaS adapters"
  claim_ids:
    - "claim-classification"
    - "claim-multi-agent"
    - "claim-project-workspaces"
    - "claim-local-external-boundary"

capabilities:
  - capability_id: "capability-multi-agent-delegation"
    ontology_id: "x-openloaf:multi-agent-delegation"
    name: "Layered agent and subagent delegation"
    description: >-
      Creates master, project-manager, channel, and specialist ToolLoopAgent
      instances, and lets an agent launch synchronous or background subagents
      under configured depth and concurrency limits.
    support_status: statically_confirmed
    scope: "Server-side Vercel AI SDK agent factory, delegation tool, and AgentManager"
    interfaces:
      - "Agent tool for synchronous or background delegation"
      - "SendMessage tool for continued subagent input"
      - "Master, project-manager, channel, and specialist ToolLoopAgent constructors"
    prerequisites:
      - "A configured chat model"
      - "An active request and chat session for background execution"
    configuration_requirements:
      - "Selected subagent type and task prompt"
      - "Model and project request context"
    limitations:
      - "The manager caps spawn depth at 2 and concurrently running subagents at 4."
      - "Documentation names Secretary, Project, and Worker roles while code names Master, PM, Channel, and SubAgent; their exact product-to-runtime mapping was not runtime verified."
      - "Agent execution behavior and delegation quality were not exercised."
    confidence: high
    claim_ids:
      - "claim-multi-agent"
    evidence_refs:
      - "evidence-agent-manager"
      - "evidence-agent-tool"
      - "evidence-agent-factory"

  - capability_id: "capability-project-workspaces"
    ontology_id: "x-openloaf:project-workspaces"
    name: "Project-centric desktop workspaces"
    description: >-
      Opens or focuses one dedicated Electron window per project and loads a
      project-scoped web route with file, agent, board, canvas, and related
      workspace experiences backed by a bundled local server.
    support_status: statically_confirmed
    scope: "Electron project-window management and bundled production server"
    interfaces:
      - "Electron main and project windows"
      - "Next.js web interface"
      - "Local Hono and tRPC API"
    prerequisites:
      - "Desktop runtime or separately started web and server processes"
      - "A project ID, root URI, and title"
    configuration_requirements:
      - "Local storage paths and server/web URLs"
    limitations:
      - "BrowserWindow sandbox and context isolation apply to the renderer, not to agent shell commands executed by the server."
      - "Window behavior and cross-platform packaging were not run."
    confidence: high
    claim_ids:
      - "claim-project-workspaces"
    evidence_refs:
      - "evidence-project-window"
      - "evidence-bundled-server"
      - "evidence-desktop-manifest"

  - capability_id: "capability-memory"
    ontology_id: "x-openloaf:scoped-memory"
    name: "User, project, ancestor-project, and agent memory"
    description: >-
      Reads and writes Markdown memory files from user, project, parent-project,
      and specialist-agent scopes and assembles bounded memory blocks for agent
      context.
    support_status: statically_confirmed
    scope: "Server memory loader and local filesystem paths"
    interfaces:
      - "MEMORY.md files"
      - "Memory loader and save tool"
    prerequisites:
      - "Writable local OpenLoafData and project directories"
    configuration_requirements:
      - "Project root and optional ancestor project roots"
      - "Optional specialist agent name"
    limitations:
      - "Each loaded memory file is truncated to 200 lines by default."
      - "The inspected context loader uses project ancestry, not the ProjectLink relation."
    confidence: high
    claim_ids:
      - "claim-memory"
      - "claim-project-linking"
    evidence_refs:
      - "evidence-memory-loader"
      - "evidence-local-paths"
      - "evidence-ancestor-resolution"

  - capability_id: "capability-skills"
    ontology_id: "x-openloaf:markdown-skills"
    name: "Built-in and filesystem skill discovery"
    description: >-
      Discovers reusable SKILL.md workflows from built-in, global,
      ancestor-project, and current-project scopes, with deterministic override
      precedence and optional tool dependency metadata.
    support_status: statically_confirmed
    scope: "Server-side skills loader and agent prompt/tool assembly"
    interfaces:
      - "SKILL.md"
      - "openloaf.json skill metadata"
      - "LoadSkill and ToolSearch agent tools"
    prerequisites:
      - "Accessible global or project skills directories"
    configuration_requirements:
      - "Optional global, ancestor-project, and current-project roots"
    limitations:
      - "Built-in skills cannot be overridden; project scope overrides parent and global filesystem skills of the same name."
      - "Skill instruction quality and safety were not evaluated."
    confidence: high
    claim_ids:
      - "claim-skills"
    evidence_refs:
      - "evidence-skills-loader"
      - "evidence-agent-factory"

  - capability_id: "capability-mcp-client"
    ontology_id: "x-openloaf:mcp-client"
    name: "Global and project-scoped MCP clients"
    description: >-
      Reads global and project MCP configurations, connects over stdio, HTTP, or
      SSE, discovers tools, and registers them in the agent tool catalog with
      connection pooling and idle cleanup.
    support_status: statically_confirmed
    scope: "MCP configuration service and MCPClientManager"
    interfaces:
      - "Model Context Protocol client"
      - "stdio, HTTP, and SSE transports"
      - "Global and project mcp-servers.json files"
    prerequisites:
      - "A configured and enabled MCP server"
      - "User trust for project-scoped configuration when required"
    configuration_requirements:
      - "Transport-specific command or URL and optional environment, headers, or OAuth configuration"
    limitations:
      - "Maximum 10 concurrent MCP connections and a five-minute idle timeout are defined."
      - "The inspected OAuth provider switch supports Notion only."
      - "Connected servers and their tool safety remain external to this repository boundary."
    confidence: high
    claim_ids:
      - "claim-mcp"
    evidence_refs:
      - "evidence-mcp-manager"
      - "evidence-mcp-config"

  - capability_id: "capability-model-routing"
    ontology_id: "x-openloaf:model-routing"
    name: "Multiple local, CLI, provider, and SaaS model routes"
    description: >-
      Resolves a selected model through user provider settings, optional CLI
      adapters, multiple AI SDK provider adapters, custom OpenAI-compatible
      endpoints, or an authenticated OpenLoaf SaaS route.
    support_status: statically_confirmed
    scope: "Server-side provider adapters and chat-model resolver"
    interfaces:
      - "Vercel AI SDK LanguageModel interface"
      - "Provider profiles, model IDs, API URLs, and credentials"
      - "Claude Code and Codex CLI adapters when installed"
    prerequisites:
      - "A configured provider profile and selected model"
      - "Credentials and network access for non-local providers"
    configuration_requirements:
      - "chatModelId and chatModelSource"
      - "Provider-specific API URL, key, or cloud account token"
    limitations:
      - "Model calls may transmit prompts, context, attachments, and tool results to the selected external service."
      - "Provider compatibility and behavior were not exercised."
    confidence: high
    claim_ids:
      - "claim-model-routing"
      - "claim-local-external-boundary"
    evidence_refs:
      - "evidence-provider-adapters"
      - "evidence-model-resolution"

  - capability_id: "capability-productivity-tools"
    ontology_id: "x-openloaf:productivity-tools"
    name: "Agent-accessible productivity and computer tools"
    description: >-
      Registers a broad catalog of file, shell, browser, desktop-control,
      project, board, calendar, email, Office, media, web, chart, widget,
      scheduling, cloud, and agent collaboration tools, using deferred
      ToolSearch activation for many entries.
    support_status: statically_confirmed
    scope: "Server tool registry and agent tool assembly"
    interfaces:
      - "Vercel AI SDK tools"
      - "ToolSearch and capability groups"
      - "Desktop and web user interfaces"
    prerequisites:
      - "Platform-specific helpers, services, or credentials for applicable tools"
      - "Agent activation of deferred tools"
    configuration_requirements:
      - "Per-tool platform, path, credential, or service configuration"
    limitations:
      - "Many tools have external side effects and platform-specific prerequisites."
      - "Availability, permission prompts, and correctness were not runtime verified."
    confidence: high
    claim_ids:
      - "claim-tools"
      - "claim-shell-risk"
    evidence_refs:
      - "evidence-root-tools"
      - "evidence-server-manifest"
      - "evidence-agent-factory"
      - "evidence-shell-execution"

  - capability_id: "capability-local-storage"
    ontology_id: "x-openloaf:local-storage"
    name: "Local application, project, and SQLite state"
    description: >-
      Stores configuration and the default database under ~/.openloaf, keeps
      user-facing data under OpenLoafData, stores project metadata under each
      project, and runs SQLite through Prisma and libSQL in the local server.
    support_status: statically_confirmed
    scope: "Default filesystem and database paths in the local server"
    interfaces:
      - "Local filesystem"
      - "SQLite database"
      - "Prisma and libSQL adapter"
    prerequisites:
      - "Writable user and project directories"
    configuration_requirements:
      - "Optional OPENLOAF_DATABASE_URL or DATABASE_URL override"
    limitations:
      - "Local state storage does not mean all processing remains local when remote models, MCP servers, cloud tools, email, calendar, or SaaS routes are selected."
      - "Encryption at rest, backup, and failure recovery were not analyzed."
    confidence: high
    claim_ids:
      - "claim-local-external-boundary"
    evidence_refs:
      - "evidence-local-paths"
      - "evidence-sqlite-adapter"
      - "evidence-server-bootstrap"

  - capability_id: "capability-project-linking"
    ontology_id: "x-openloaf:project-link-context"
    name: "Project linking for shared memory and skills"
    description: >-
      Documentation claims arbitrary project links inject linked memory and
      skills, and the database defines a many-to-many ProjectLink relation; the
      targeted runtime inspection found context assembly for project ancestors
      but did not find a ProjectLink-consuming path.
    support_status: partially_implemented
    scope: "Documented project-link experience, Prisma schema, and inspected memory/skills context resolution"
    interfaces:
      - "ProjectLink database relation"
      - "Project workspace linking UI described by documentation"
    prerequisites:
      - "Two or more registered projects"
    configuration_requirements:
      - "An explicit source-to-target project link"
    limitations:
      - "No runtime path consuming ProjectLink for memory or skill injection was found at targeted analysis depth."
      - "Absence in the targeted search is not proof that the capability is absent elsewhere."
    confidence: medium
    claim_ids:
      - "claim-project-linking"
    evidence_refs:
      - "evidence-root-project-linking"
      - "evidence-project-link-schema"
      - "evidence-ancestor-resolution"
      - "evidence-memory-loader"
      - "evidence-skills-loader"

architecture:
  overview: >-
    Electron packages and supervises a local Node server plus a Next.js static
    web application. The renderer presents main and project windows while Hono
    and tRPC expose local APIs. The server constructs Vercel AI SDK ToolLoopAgent
    instances, activates static, MCP, and cloud tools through a registry, routes
    models through user or SaaS provider adapters, and assembles filesystem
    memory and skills into project-scoped context. Prisma with a libSQL adapter
    persists application metadata in SQLite; other state resides in user and
    project directories. Optional model, MCP, messaging, cloud, email, and
    calendar integrations cross the local process boundary.
  languages:
    - "TypeScript"
    - "JavaScript"
    - "CSS"
    - "Prisma schema"
    - "YAML for CI and release workflows"
  frameworks_and_sdks:
    - name: "Next.js"
      version_constraint: "^16.1.4"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-project-workspaces"
    - name: "React"
      version_constraint: "19.x workspace constraint"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-project-workspaces"
    - name: "Hono and tRPC"
      version_constraint: "Workspace catalog and @hono/node-server ^1.19.9"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-project-workspaces"
    - name: "Vercel AI SDK"
      version_constraint: "ai ^6.0.168"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-multi-agent"
        - "claim-model-routing"
  model_providers:
    - name: "OpenAI, Anthropic, Google, DeepSeek, xAI, Moonshot, Alibaba/Qwen, Amazon Bedrock, Vercel, custom OpenAI-compatible, CLI, and OpenLoaf SaaS adapters"
      version_constraint: "Provider SDK versions declared in apps/server/package.json"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-model-routing"
  runtime_and_orchestration:
    - name: "Vercel AI SDK ToolLoopAgent"
      version_constraint: "ai ^6.0.168"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-multi-agent"
    - name: "AgentManager"
      version_constraint: "Bundled at the analyzed commit"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-multi-agent"
  tools_and_mcp:
    tools:
      - name: "OpenLoaf static and deferred tool registry"
        version_constraint: "Bundled at the analyzed commit"
        dependency_relation: bundled
        required: true
        claim_ids:
          - "claim-tools"
      - name: "@ai-sdk/mcp"
        version_constraint: "^1.0.36"
        dependency_relation: optional
        required: false
        claim_ids:
          - "claim-mcp"
    mcp_role: client
    mcp_details:
      - "Connects to user-configured MCP servers over stdio, HTTP, or SSE."
      - "Merges global and project configurations with project name precedence."
      - "Registers discovered tools dynamically for ToolSearch and agent execution."
      - "Project-scoped configuration changes revoke stored trust until reapproved."
  skills:
    - name: "OpenLoaf SKILL.md loader"
      version_constraint: "Bundled at the analyzed commit"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-skills"
  memory_and_state:
    - name: "Markdown scoped memory"
      version_constraint: "MEMORY.md files at user, project, ancestor-project, and agent scopes"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-memory"
    - name: "Chat and agent filesystem stores"
      version_constraint: "Bundled at the analyzed commit"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-multi-agent"
  retrieval_and_knowledge:
    - name: "File search and web-search tools"
      version_constraint: "Bundled or optionally cloud-backed"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-tools"
  document_processing:
    - name: "PDF, DOCX, spreadsheet, presentation, image, archive, and rich-text libraries and tools"
      version_constraint: "Versions declared in server and web manifests"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-tools"
  execution_and_sandbox:
    - name: "Operating-system shell command tool"
      version_constraint: "Bundled at the analyzed commit"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-shell-risk"
    - name: "Electron renderer sandbox"
      version_constraint: "Electron 40.1.0 configuration"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-project-workspaces"
  gateways_and_routing:
    - name: "Provider adapter registry"
      version_constraint: "Bundled at the analyzed commit"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-model-routing"
    - name: "OpenLoaf SaaS"
      version_constraint: "External service through @openloaf-saas/sdk ^0.3.9"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-local-external-boundary"
  storage_and_databases:
    - name: "SQLite via PrismaLibSql"
      version_constraint: "Prisma 7 schema as described by repository documentation"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-local-external-boundary"
        - "claim-project-linking"
  interfaces:
    - name: "Electron desktop interface"
      version_constraint: "desktop 0.2.9; Electron 40.1.0"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-project-workspaces"
    - name: "Next.js web interface"
      version_constraint: "web 0.2.9"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-project-workspaces"
    - name: "Hono and tRPC local API"
      version_constraint: "server 0.2.9"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-project-workspaces"
  deployment:
    - name: "Electron packages for macOS, Windows, and Linux"
      version_constraint: "desktop 0.2.9"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-project-workspaces"
        - "claim-maturity"
    - name: "Local web and server development processes"
      version_constraint: "Node.js >=20 and pnpm >=10 documented"
      dependency_relation: development
      required: false
      claim_ids:
        - "claim-project-workspaces"
  observability_and_evaluation:
    - name: "Repository test and browser-test scripts"
      version_constraint: "Static script definitions at the analyzed commit"
      dependency_relation: development
      required: false
      claim_ids:
        - "claim-maturity"
    - name: "CodeQL workflow"
      version_constraint: "JavaScript/TypeScript analysis on main, pull requests, and weekly schedule"
      dependency_relation: development
      required: false
      claim_ids:
        - "claim-maturity"
  security_and_permissions:
    - name: "Shell command approval filter"
      version_constraint: "Static allowlist and path checks at the analyzed commit"
      dependency_relation: bundled
      required: true
      claim_ids:
        - "claim-shell-risk"
    - name: "MCP project-config trust hash"
      version_constraint: "Bundled at the analyzed commit"
      dependency_relation: bundled
      required: false
      claim_ids:
        - "claim-mcp"
  data_flows:
    - "Electron starts a bundled local server and loads the local web interface into main and project windows."
    - "A chat request selects a provider profile and model, loads project and user context, constructs an agent, and streams model and tool events to the interface."
    - "Agents use ToolSearch to activate deferred static, MCP, or cloud tools and can delegate tasks to managed subagents."
    - "Memory and skills are read from user and project files; application metadata is read from and written to local SQLite."
    - "Remote model, MCP, cloud, email, calendar, messaging, browser, and update integrations can send data outside the local OpenLoaf process."
  control_flows:
    - "Master or project-manager agents run model-directed tool loops with step limits and tool activation guards."
    - "The Agent tool spawns specialist subagents and either waits for completion or registers a background task."
    - "AgentManager enforces a maximum spawn depth of 2 and four concurrent running subagents."
    - "MCP configuration is merged by scope, connected at startup or on demand, and disconnected after idle time or shutdown."
    - "Shell commands pass through a static approval decision before execution in the resolved working directory."

