open_questions:
  - question: "Where, if anywhere, does the runtime query ProjectLink records and inject linked-project memory and skills?"
    reason: "The README and schema support the product concept, but targeted context paths resolve only project ancestors."
    related_claim_ids:
      - "claim-project-linking"
  - question: "Which external integrations are covered by the README's no-upload and offline claims, and what data is sent by each optional route?"
    reason: "Static source includes remote model, SaaS, MCP, cloud-tool, email, calendar, messaging, and update paths that need feature-specific privacy documentation."
    related_claim_ids:
      - "claim-local-external-boundary"
  - question: "How do the documented Secretary, Project, and Worker roles map exactly to Master, PM, Channel, and SubAgent runtime roles?"
    reason: "Both role vocabularies are present, but their complete product-to-code mapping was not established at targeted depth."
    related_claim_ids:
      - "claim-multi-agent"
