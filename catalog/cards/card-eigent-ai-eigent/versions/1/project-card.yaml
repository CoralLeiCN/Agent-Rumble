usage:
  installation: >-
    For the cloud-connected source workflow, the README instructs users to clone
    the repository, run npm install, and run npm run dev with Node.js 18-22. The
    Electron host installs or uses packaged Python/uv dependencies and starts the
    Brain. For fully local application services, server/README_EN.md instructs
    users to configure server/.env, start server/docker-compose.yml, point the
    frontend proxy at localhost:3001, and run the frontend. These instructions
    were inspected but not run.
  minimal_start: >-
    A minimal source preview uses npm install and npm run dev with the configured
    cloud application server, then supplies a model through the UI. A local web
    client can instead point VITE_BRAIN_ENDPOINT at a separately started Brain.
    Full self-hosting additionally requires the application-server Docker Compose
    services and local routing configuration.
  configuration:
    - "Model platform, model type, API URL, credentials, and provider-specific model parameters"
    - "VITE_BRAIN_ENDPOINT for a web-hosted Brain connection"
    - "VITE_BASE_URL, VITE_PROXY_URL, VITE_USE_LOCAL_PROXY, and SERVER_URL for application-server routing"
    - "EIGENT_DEPLOYMENT_TYPE and EIGENT_HANDS_* for terminal, browser, filesystem, and MCP capabilities"
    - "User/project workspace bindings and local Eigent state directories"
    - "MCP server, skill, toolkit, and optional remote-sub-agent configurations"
    - "Docker and database environment variables for the self-hosted server stack"
  required_services:
    - "A model endpoint compatible with the selected CAMEL platform configuration"
    - "The local Brain for agent execution"
    - "The configured Eigent application server for identity, product configuration, project, and history APIs"
    - "PostgreSQL and Redis for the documented self-hosted application-server stack"
    - "External services only for the model, MCP, search, connector, media, or remote-agent capabilities selected by the user"
  extension_points:
    - "Add or configure custom workforce workers through new_agents"
    - "Add toolkits and agent factories under backend/app/agent/"
    - "Install MCP servers through mcpServers configuration and connector APIs"
    - "Add SKILL.md skills at project, user, or system scope"
    - "Configure new CAMEL-supported or OpenAI-compatible model endpoints"
    - "Implement a RemoteSubAgentProvider and register it with the provider registry"
    - "Extend application-server domains under server/app/domains/"
    - "Add desktop/web host behavior through the frontend host abstraction and Electron IPC"

