project:
  project_id: "project-eigent-ai-eigent"
  name: "Eigent"
  primary_type: agent_application
  type_rationale: >-
    Eigent is primarily a deployable general-purpose agent product rather than a
    reusable framework or SDK. The analyzed boundary contains an Electron and
    React desktop/web experience, a Python agent-execution Brain, a self-hostable
    application server, persistent project state, task progress interfaces, and
    release packaging. CAMEL is the embedded orchestration framework, while
    workforce and single-agent execution are product capabilities.
  boundary: >-
    The Eigent product implemented by the single public eigent-ai/eigent
    repository at tag v1.0.1 and commit
    25f6f1ae1ca2c74da61a0f3009c1de2a256ac942. Included are the Electron host,
    React renderer and web client, Python Brain under backend/, local application
    server under server/, agent factories and toolkits, MCP and skill management,
    local memory and workspace code, deployment configuration, repository-hosted
    documentation, representative tests, and GitHub Actions workflows. Excluded
    are eigent.ai hosted services and websites, model-provider implementations,
    MCP server implementations, remote sub-agent provider infrastructure,
    third-party dependency source, issues and pull requests, release binaries,
    translated README duplication except where needed to resolve scope, and all
    runtime behavior.
  repositories:
    - source_id: "source-eigent-repository"
      url: "https://github.com/eigent-ai/eigent"
      owner: "eigent-ai"
      role: primary
      included_paths:
        - "README.md"
        - "LICENSE"
        - "SECURITY.md"
        - "package.json"
        - "electron/"
        - "src/"
        - "backend/"
        - "server/"
        - "docs/"
        - "resources/example-skills/"
        - "test/"
        - ".github/workflows/"
      excluded_paths:
        - "README translations not needed for distinct evidence"
        - "Binary media and generated source maps"
        - "Packaged release artifacts and hosted Eigent services"
        - "Third-party dependency source, issues, pull requests, and external MCP servers"
        - "Runtime execution, dependency installation, and dynamic security testing"
  packages:
    - "eigent 1.0.1 (private root npm package)"
    - "backend 0.1.0 (Python Brain package)"
    - "Eigent 0.1.0 (Python application-server package)"
    - "Vendored @stackframe/react workspace package"
  services:
    - "Eigent Electron desktop host and React renderer"
    - "Eigent web client"
    - "Eigent Brain FastAPI agent runtime"
    - "Eigent application-server FastAPI API"
    - "Optional Celery worker and scheduler"
    - "PostgreSQL and Redis services for self-hosted server deployment"
  documentation_sites:
    - "Repository-hosted documentation under docs/"
    - "https://docs.eigent.ai (linked but not analyzed)"
  license: >-
    Conflicted first-party metadata: the root LICENSE and README identify Apache
    License 2.0, while the root package.json declares MIT.
  status: active

