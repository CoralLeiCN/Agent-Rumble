summary:
  one_line: >-
    An open-source desktop and web agent application that combines CAMEL-based
    multi-agent workforces, local computer tools, MCP connectors, skills, and
    optional self-hosted application services.
  purpose: >-
    Eigent lets users give general knowledge-work and computer-use tasks to
    either a coordinated workforce of specialized agents or a single agent,
    observe execution, provide human input, and extend the system with models,
    tools, MCP servers, skills, and optional remote sub-agents.
  target_users:
    - "Individuals automating research, coding, document, browser, and media workflows"
    - "Technical teams evaluating a local-first general-purpose agent desktop"
    - "Developers extending an open-source CAMEL-based agent application"
    - "Organizations willing to self-host identity, configuration, and project data services"
  primary_use_cases:
    - "Decompose complex requests across specialized agents"
    - "Run browser, terminal, file, document, spreadsheet, presentation, and media tasks"
    - "Connect user-supplied MCP servers and repository or user skills"
    - "Use hosted, OpenAI-compatible, subscription-backed, or local model endpoints"
    - "Persist project context and artifacts across runs"
    - "Operate through an Electron desktop, a web client, or a self-hosted server configuration"

