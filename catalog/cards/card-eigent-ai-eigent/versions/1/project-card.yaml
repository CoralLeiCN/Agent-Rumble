    - "Workforce metrics callbacks and request-usage events"
    - "FastAPI health endpoints and Electron backend-ready lifecycle events"
    - "GitHub Actions frontend checks, Python tests, smoke tests, CodeQL, and multi-platform release builds"
  security_and_permissions:
    - "Brain routes except health are registered with an authentication dependency."
    - "Deployment-derived Hands capability profiles filter browser, terminal, filesystem, and MCP access."
    - "Skill paths are normalized under managed roots for CRUD operations."
    - "Remote-sub-agent file selection is working-directory scoped and denylisted for common secret paths."
    - "The application server provides local authentication, CORS middleware, trace IDs, and sensitive-log filtering."
    - "SECURITY.md documents a vulnerability-reporting process; no security audit was performed."
  data_flows:
    - >-
      A user task flows from the React client over the Brain HTTP/SSE API. In
      single-agent mode it is handled by one assembled agent; in workforce mode
      a complexity check may answer directly or construct a workforce, decompose
      the task, assign specialized workers, and stream task/tool events back.
    - >-
      Agent model configuration flows into CAMEL ModelFactory, which calls the
      selected hosted, subscription-backed, OpenAI-compatible, or local model
      endpoint; tool results return to the invoking agent conversation.
    - >-
      MCP configurations and skills are loaded from project or user state,
      filtered by deployment and agent policy, connected or discovered, and
      exposed as model-callable tools.
    - >-
      Run events, conversation text, artifacts, and status are written
      best-effort to local memory and used to build bounded context for later
      turns; application-level project and chat data can also persist through
      the configured server and PostgreSQL.
  control_flows:
    - "session_mode selects single-agent execution or the workforce loop."
    - "The question-confirmation agent and attachment presence determine whether a workforce is constructed for a new workforce-mode request."
    - "The workforce planner decomposes work, CAMEL assigns pending tasks, and retry/replan failure strategies are enabled."
    - "Hands capabilities and per-toolkit settings determine which execution surfaces are attached to each agent."
    - "Remote sub-agent delegation is disabled unless configured and is bounded by provider allowlisting and a wall-time policy."

