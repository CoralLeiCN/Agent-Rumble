architecture:
  overview: >-
    A React application runs in Electron or a browser. Electron starts a local
    FastAPI Brain and exposes its selected localhost port through IPC; the web
    client can point directly at a Brain endpoint. The Brain uses CAMEL agents
    and Workforce orchestration for single-agent or decomposed multi-agent work,
    assembling local and hosted tools according to a deployment capability
    profile. Local files hold workspaces, skills, MCP configuration, and durable
    memory. A separate FastAPI application server provides identity, provider,
    configuration, project/chat, MCP, trigger, and related product APIs; the
    documented self-hosted stack adds PostgreSQL, Redis, and Celery services.
  languages:
    - "TypeScript"
    - "Python"
    - "JavaScript"
    - "CSS"
    - "SQL and Alembic migration scripts"
  frameworks_and_sdks:
    - name: "CAMEL-AI for the Brain"
      version_constraint: "camel-ai[eigent]==0.2.91a5"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-workforce"
        - "claim-model-routing"
    - name: "CAMEL-AI for the application server"
      version_constraint: "camel-ai==0.2.90a6 with a uv source override to camel-ai/camel rev feat-trigger"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-local-deployment"
    - name: "FastAPI"
      version_constraint: ">=0.115.12 in both Python packages"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-desktop-stack"
        - "claim-local-deployment"
    - name: "React"
      version_constraint: "^18.3.1"
      dependency_relation: development
      required: true
      claim_ids:
        - "claim-desktop-stack"
    - name: "Electron"
      version_constraint: "^33.2.0"
      dependency_relation: development
      required: true
      claim_ids:
        - "claim-desktop-stack"
    - name: "Vite"
      version_constraint: "^5.4.11"
      dependency_relation: development
      required: true
      claim_ids:
        - "claim-desktop-stack"
  model_providers:
    - name: "OpenAI API and OpenAI-compatible endpoints"
      version_constraint: "openai>=1.99.3,<2 in both Python packages"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-model-routing"
    - name: "Anthropic, Google Gemini, AWS Bedrock, Azure OpenAI, OpenRouter, and other CAMEL-supported providers"
      version_constraint: "Provider adapters supplied through pinned CAMEL packages"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-routing"
    - name: "vLLM, Ollama, LM Studio, and other configurable local or OpenAI-compatible endpoints"
      version_constraint: "User-operated endpoint; no project package constraint"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-routing"
    - name: "Codex subscription runtime"
      version_constraint: "Repository OAuth/subscription adapter at analyzed commit"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-model-routing"
  runtime_and_orchestration:
    - name: "Uvicorn"
      version_constraint: "uvicorn[standard]>=0.34.2 in the Brain"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-desktop-stack"
    - name: "CAMEL Workforce"
      version_constraint: "Provided by camel-ai[eigent]==0.2.91a5"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-workforce"
    - name: "Celery"
      version_constraint: ">=5.6.2"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-local-deployment"
    - "Application-level task locks, SSE event queues, and worker lifecycle management"
  tools_and_mcp:
    tools:
      - name: "CAMEL and Eigent local toolkits"
        version_constraint: "Repository implementations plus camel-ai[eigent]==0.2.91a5"
        dependency_relation: bundled
        required: false
        claim_ids:
          - "claim-tool-surface"
      - name: "CAMEL MCPToolkit"
        version_constraint: "Provided by camel-ai[eigent]==0.2.91a5"
        dependency_relation: direct
        required: false
