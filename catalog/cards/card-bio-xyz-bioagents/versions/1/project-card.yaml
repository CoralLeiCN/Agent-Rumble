architecture:
  overview: >-
    A Bun-hosted TypeScript application with an Elysia HTTP/WebSocket server and
    Preact client. Chat uses an Anthropic tool loop, while deep research uses an
    application-managed pipeline of planning, literature, analysis, hypothesis,
    reflection, continuation, and reply agents. Supabase stores application and
    retrieval data; S3-compatible storage holds uploads; optional BullMQ/Redis
    workers execute long-running jobs and publish progress to WebSocket clients.
  languages:
    - "TypeScript"
    - "JavaScript/JSX"
    - "SQL/PLpgSQL"
    - "CSS"
  frameworks_and_sdks:
    - name: "Elysia"
      version_constraint: "^1.4.12"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-application-stack"
    - name: "Preact"
      version_constraint: "^10.27.2"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-application-stack"
    - name: "Docusaurus"
      version_constraint: "3.9.2"
      dependency_relation: development
      required: false
      claim_ids:
        - "claim-application-stack"
  model_providers:
    - name: "Anthropic API via @anthropic-ai/sdk"
      version_constraint: "^0.90.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-chat-agent-loop"
        - "claim-multi-provider-llm"
    - name: "OpenAI API via openai"
      version_constraint: "^6.34.0"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-multi-provider-llm"
    - name: "Google AI via @google/genai"
      version_constraint: "^1.25.0"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-multi-provider-llm"
    - name: "OpenRouter via the project's OpenRouter adapter"
      version_constraint: "OpenAI-compatible API; no distinct package constraint"
      dependency_relation: hosted
      required: false
      claim_ids:
        - "claim-multi-provider-llm"
  runtime_and_orchestration:
    - "Bun runtime and package manager"
    - name: "BullMQ"
      version_constraint: "^5.66.0"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-queued-execution"
    - "Application-managed multi-agent orchestration"
    - "Anthropic messages tool loop for conversational chat"
  tools_and_mcp:
    tools:
      - name: "Internal literature_search model tool"
        version_constraint: "Repository implementation at analyzed commit"
        dependency_relation: bundled
        required: false
        claim_ids:
          - "claim-chat-agent-loop"
          - "claim-literature-backends"
    mcp_role: unclear
    mcp_details:
      - "src/mcp/index.ts contains only a 'Coming soon' comment at the analyzed revision."
      - "No implemented MCP client or server role was identified at targeted depth; this is not proof that MCP is absent from every historical or external component."
  skills:
    - name: "Claude Agent SDK filesystem-skill helper"
      version_constraint: "@anthropic-ai/claude-agent-sdk ^0.1.26"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-skill-runner-permissions"
  memory_and_state:
    - name: "Supabase client"
      version_constraint: "@supabase/supabase-js ^2.76.1"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-persistent-research-state"
        - "claim-application-stack"
    - "PostgreSQL-backed ConversationState and message records"
    - name: "Redis client via ioredis"
      version_constraint: "^5.8.2"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-queued-execution"
  retrieval_and_knowledge:
    - "Supabase-backed document chunks and vector-search functions"
    - name: "Cohere reranking"
      version_constraint: "cohere-ai ^7.19.0"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-local-knowledge-retrieval"
    - "OpenAI-configurable text embeddings"
    - "BioLiterature, OpenScholar, and Edison hosted literature integrations"
  document_processing:
    - name: "pdf-parse"
      version_constraint: "2.4.5"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-file-ingestion"
        - "claim-local-knowledge-retrieval"
    - name: "mammoth"
      version_constraint: "^1.11.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-local-knowledge-retrieval"
    - name: "Papa Parse"
      version_constraint: "papaparse ^5.5.3"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-file-ingestion"
    - name: "SheetJS xlsx"
      version_constraint: "^0.18.5"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-file-ingestion"
    - name: "Tesseract.js"
      version_constraint: "^7.0.0"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-file-ingestion"
  execution_and_sandbox:
    - name: "Claude Agent SDK helper permitting Skill, Read, Grep, and Bash tools"
      version_constraint: "@anthropic-ai/claude-agent-sdk ^0.1.26"
      dependency_relation: optional
      required: false
      claim_ids:
        - "claim-skill-runner-permissions"
    - "No project-defined isolation boundary for that helper was established at targeted depth."
  gateways_and_routing:
    - "Elysia route composition"
    - "Per-agent LLM provider/model routing"
    - "Environment-selected literature and analysis backends"
  storage_and_databases:
    - "Supabase-hosted PostgreSQL"
    - name: "AWS S3 client"
      version_constraint: "@aws-sdk/client-s3 ^3.934.0"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-file-ingestion"
    - "S3-compatible object storage"
    - "Redis persistence for optional BullMQ queues"
  interfaces:
    - "Elysia HTTP JSON API"
    - "Authenticated WebSocket /api/ws"
    - "Preact browser UI"
    - "Bull Board queue administration UI"
  deployment:
    - "Bun process"
    - "Docker image"
    - "Docker Compose API, worker, and Redis configurations"
    - "Supabase migrations"
  observability_and_evaluation:
    - name: "Pino structured logging"
      version_constraint: "^10.1.0"
      dependency_relation: direct
      required: true
      claim_ids:
        - "claim-application-stack"
    - "HTTP health endpoint with optional Redis status"
    - "Token-usage persistence"
    - "GitHub Actions unit and integration test workflow"
  security_and_permissions:
    - name: "jose JWT implementation"
      version_constraint: "^6.1.0"
      dependency_relation: direct
      required: false
      claim_ids:
        - "claim-security-controls"
    - "CORS origin allowlist and response security headers"
    - "JWT/password/no-auth modes"
    - "Conversation-scoped WebSocket subscription checks"
    - "Application rate limiting"
  data_flows:
    - >-
      A chat message and bounded history flow into the Anthropic chat loop; the
      model may call literature_search, whose result is returned to the loop
      before a streamed or non-streamed answer is persisted.
    - >-
      A deep-research request flows through planning into concurrent literature
      and dataset-analysis tasks, then hypothesis and reflection/discovery,
      next-step planning, an optional continuation decision, and a user-facing
      reply; ConversationState is persisted between stages.
    - >-
      Uploaded files flow through S3-compatible object storage and file-status
      records into synchronous or queued extraction and description, after which
      dataset metadata is attached to the conversation state.
    - >-
      Local knowledge documents flow through extraction and chunking into
      Supabase; embedded queries retrieve and optionally rerank chunks for the
      literature agent.
  control_flows:
    - "The chat model chooses whether and how often to call the registered literature tool, bounded by a configurable soft tool-call cap."
    - "The planning agent emits LITERATURE and ANALYSIS tasks, which the deep-research route executes concurrently at each plan level."
    - "The continuation agent determines whether another deep-research iteration runs automatically or control returns to the user."
    - "USE_JOB_QUEUE selects in-process execution or BullMQ/Redis-backed worker execution."

