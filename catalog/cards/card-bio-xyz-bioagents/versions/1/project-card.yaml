usage:
  installation: >-
    For historical evaluation, clone the pinned revision, install the locked Bun
    dependencies with bun install, copy .env.example to .env, configure model and
    supporting services, apply Supabase migrations, and use either the Bun
    development process or Docker deployment. These instructions were not run.
  minimal_start: >-
    Configure Supabase and ANTHROPIC_API_KEY for the current chat path, then run
    bun run dev and access the application on its configured port. Deep research,
    file handling, local knowledge, and queue mode require additional services
    and environment variables.
  configuration:
    - "Environment variables select per-agent model providers and models."
    - "PRIMARY_LITERATURE_AGENT and PRIMARY_ANALYSIS_AGENT select external research backends."
    - "KNOWLEDGE_DOCS_PATH and embedding/reranking variables configure local RAG."
    - "AUTH_MODE, BIOAGENTS_SECRET, UI_PASSWORD, and allowed origins configure access."
    - "USE_JOB_QUEUE, REDIS_URL, concurrency, and rate-limit variables configure background execution."
    - "S3-compatible storage variables configure file uploads."
  required_services:
    - "At least one hosted LLM provider; Anthropic is required for /api/chat at the analyzed revision"
    - "Supabase/PostgreSQL for application state and local retrieval"
    - "Selected external literature and analysis services for those capabilities"
    - "S3-compatible storage for direct file upload and external analysis paths"
    - "Redis and a worker process only when queue mode is enabled"
  extension_points:
    - "Add specialized agents under src/agents/ and export them into orchestration routes"
    - "Register chat-agent tools through src/chat-agent/registry.ts"
    - "Add or modify shared LLM adapters under src/llm/adapters/"
    - "Select or extend literature and analysis backends"
    - "Provide character identity/system configuration under characters/"
    - "Add local knowledge documents under the configured knowledge directory"

