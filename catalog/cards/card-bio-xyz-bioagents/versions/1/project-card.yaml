project:
  project_id: "project-bio-xyz-bioagents"
  name: "BioAgents"
  primary_type: agent_application
  type_rationale: >-
    Although the README describes BioAgents as a framework, the analyzed project
    boundary is a deployable, full-stack biological-research application: it
    includes a web client, HTTP and WebSocket APIs, persistent conversation
    state, specialized research-agent workflows, background workers, and
    deployment configuration. It does expose internal extension points, but it
    is not packaged primarily as a reusable SDK.
  boundary: >-
    The historical BioAgents product implemented by the single public
    bio-xyz/BioAgents repository at commit
    2699692df52c2b24892058bcf148e8a152ac4017. Included are the root application
    package and manifests, Bun/Elysia backend, Preact client, agent workflows,
    retrieval and file-processing code, Supabase schema, queue and WebSocket
    infrastructure, Docker configuration, repository documentation,
    representative tests, and CI configuration. Excluded are the successor BIOS
    product and websites, linked external service repositories and hosted APIs,
    third-party dependency source, issues and pull requests, editor/assistant
    configuration content, binary fixtures, and all runtime behavior.
  repositories:
    - source_id: "source-bioagents-repository"
      url: "https://github.com/bio-xyz/BioAgents"
      owner: "bio-xyz"
      role: primary
      included_paths:
        - "README.md"
        - "package.json"
        - "bun.lock"
        - "src/"
        - "client/src/"
        - "characters/"
        - "documentation/"
        - "supabase/"
        - ".github/workflows/"
        - "Dockerfile"
        - "docker-compose.yml"
        - "docker-compose.worker.yml"
        - "docker-compose.swarm.yml"
      excluded_paths:
        - ".claude/ skill content (loader inspected; skill instructions not analyzed as control input)"
        - ".cursor/"
        - ".vscode/"
        - ".husky/"
        - "test/fixtures/ binary contents"
        - "Linked external repositories, hosted services, issues, pull requests, and release assets"
  packages:
    - "bioagents-openai-agentkit (private root Bun package)"
    - "docusaurus-temp 0.0.0 (private documentation package)"
  services:
    - "BioAgents Elysia API and WebSocket server"
    - "BioAgents BullMQ worker process"
    - "BioAgents Preact web client"
    - "Repository-hosted Docusaurus documentation"
  documentation_sites:
    - "Repository-hosted Docusaurus source under documentation/"
  license: null
  status: archived

