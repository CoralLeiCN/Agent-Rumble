    - "claim-archived-status"

capabilities:
  - capability_id: "capability-conversational-research-chat"
    ontology_id: "x-bioagents:conversational-research-chat"
    name: "Conversational biological-research chat"
    description: >-
      Runs an Anthropic-backed chat agent loop that can stream responses, load a
      bounded conversation history, and invoke a literature-search tool selected
      by the model.
    support_status: statically_confirmed
    scope: "The /api/chat route and web chat experience"
    interfaces:
      - "HTTP /api/chat"
      - "Preact web client"
      - "WebSocket progress notifications when queue mode is enabled"
    prerequisites:
      - "Anthropic API access for the current chat-agent loop"
      - "Configured literature source for tool-assisted answers"
      - "Supabase-backed conversation records for persisted history"
    configuration_requirements:
      - "ANTHROPIC_API_KEY"
      - "CHAT_AGENT_MODEL"
      - "CHAT_AGENT_MAX_TOOL_CALLS"
      - "CHAT_AGENT_MAX_TOKENS"
      - "At least one of OPENSCHOLAR_API_URL, BIO_LIT_AGENT_API_URL, or KNOWLEDGE_DOCS_PATH for literature tool use"
    limitations:
      - "The chat path uses the Anthropic SDK directly rather than the project's multi-provider adapter."
      - "Its registered tool surface at the analyzed snapshot is limited to literature_search."
      - "No runtime behavior was verified."
    confidence: high
    claim_ids:
