    capabilities: null

summary:
  one_line: >-
    An archived, self-hostable TypeScript application for conversational and
    iterative multi-agent research in biology and the life sciences.
  purpose: >-
    BioAgents combines literature retrieval, dataset-analysis integrations,
    planning, hypothesis generation, reflection, persistent research state, and
    a web experience to support biological research workflows.
  target_users:
    - "Biological and life-science researchers"
    - "Research software engineers evaluating agentic research workflows"
    - "Developers studying a historical full-stack multi-agent application"
  primary_use_cases:
    - "Answer biological research questions with literature-search tools"
    - "Run iterative deep-research workflows over literature and uploaded datasets"
    - "Search a configurable local scientific knowledge base"
    - "Study or adapt an archived multi-agent research architecture"

classification:
  secondary_characteristics:
    - "multi-agent research application"
    - "retrieval-augmented generation"
    - "human-feedback and autonomous iterative workflow"
    - "full-stack web application"
